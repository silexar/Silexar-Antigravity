# 🌐 Traefik Configuration for Silexar Pulse Quantum
# Production-ready reverse proxy and load balancer configuration
# 
# @author SILEXAR AI Team
# @version 2040.1.0

# Global Configuration
global:
  checkNewVersion: false
  sendAnonymousUsage: false

# Entry Points
entryPoints:
  web:
    address: ":80"
    http:
      redirections:
        entrypoint:
          to: websecure
          scheme: https
          permanent: true
  websecure:
    address: ":443"
  traefik:
    address: ":8080"

# Providers
providers:
  docker:
    endpoint: "unix:///var/run/docker.sock"
    exposedByDefault: false
    network: silexar-monitoring
  file:
    directory: /etc/traefik/dynamic
    watch: true

# API and Dashboard
api:
  dashboard: true
  debug: false
  insecure: false

# Metrics
metrics:
  prometheus:
    addEntryPointsLabels: true
    addServicesLabels: true
    addRoutersLabels: true
    buckets:
      - 0.1
      - 0.3
      - 1.2
      - 5.0

# Tracing
tracing:
  jaeger:
    samplingServerURL: http://jaeger:5778/sampling
    localAgentHostPort: jaeger:6831

# Access Log
accessLog:
  format: json
  fields:
    defaultMode: keep
    names:
      ClientUsername: drop
    headers:
      defaultMode: keep
      names:
        User-Agent: redact
        Authorization: drop
        Content-Type: keep

# Log
log:
  level: INFO
  format: json

# Certificates
certificatesResolvers:
  letsencrypt:
    acme:
      email: devops@silexar.com
      storage: /data/acme.json
      httpChallenge:
        entryPoint: web

# Pilot (Traefik Cloud)
pilot:
  dashboard: false