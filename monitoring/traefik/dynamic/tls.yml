# 🔒 TLS Configuration for Traefik
# SSL/TLS settings for secure communication
# 
# @author SILEXAR AI Team
# @version 2040.1.0

tls:
  options:
    default:
      sslStrategies:
        - "tls.SniStrict"
      minVersion: "VersionTLS12"
      maxVersion: "VersionTLS13"
      cipherSuites:
        - "TLS_ECDHE_RSA_WITH_AES_256_GCM_SHA384"
        - "TLS_ECDHE_RSA_WITH_CHACHA20_POLY1305"
        - "TLS_ECDHE_RSA_WITH_AES_128_GCM_SHA256"
        - "TLS_RSA_WITH_AES_256_GCM_SHA384"
        - "TLS_RSA_WITH_AES_128_GCM_SHA256"
      curvePreferences:
        - CurveP521
        - CurveP384
      sniStrict: true

http:
  middlewares:
    # Security headers middleware — applied to ALL routes
    security-headers:
      headers:
        accessControlAllowMethods:
          - GET
          - OPTIONS
          - PUT
          - POST
          - DELETE
          - PATCH
        accessControlMaxAge: 600
        hostsProxyHeaders:
          - "X-Forwarded-Host"
        # strict-origin-when-cross-origin: sends origin on same-origin, only origin (no path) cross-origin
        referrerPolicy: "strict-origin-when-cross-origin"
        sslRedirect: true
        stsSeconds: 63072000          # 2 years — HSTS preload requirement
        stsIncludeSubdomains: true
        stsPreload: true
        forceSTSHeader: true
        frameDeny: true               # X-Frame-Options: DENY
        contentTypeNosniff: true      # X-Content-Type-Options: nosniff
        browserXssFilter: true        # Legacy X-XSS-Protection (belt + suspenders)
        contentSecurityPolicy: "default-src 'self'; script-src 'self' 'strict-dynamic' https:; style-src 'self' 'unsafe-inline'; img-src 'self' data: https: blob:; font-src 'self' data:; connect-src 'self' https://*.supabase.co https://api.anthropic.com wss:; frame-src 'none'; object-src 'none'; form-action 'self'; base-uri 'self'; upgrade-insecure-requests"
        customRequestHeaders:
          X-Forwarded-Proto: "https"
        customResponseHeaders:
          X-Robots-Tag: "none,noarchive,nosnippet,notranslate,noimageindex"
          Permissions-Policy: "camera=(), microphone=(), geolocation=(), payment=(), usb=(), bluetooth=()"
          server: ""
          X-Powered-By: ""
          X-DNS-Prefetch-Control: "off"

    # General API rate limit — 100 req/min, burst 150
    rate-limit:
      rateLimit:
        average: 100
        period: 1m
        burst: 150

    # Auth route rate limit — 5 req/min, burst 10 (brute force protection)
    rate-limit-auth:
      rateLimit:
        average: 5
        period: 1m
        burst: 10

    # AI/Cortex route rate limit — 50 req/min
    rate-limit-cortex:
      rateLimit:
        average: 50
        period: 1m
        burst: 60

    # Chain: security headers + general rate limit (default for all app routes)
    default-chain:
      chain:
        middlewares:
          - security-headers
          - rate-limit

    # Chain: security headers + auth rate limit (for /api/auth/* routes)
    auth-chain:
      chain:
        middlewares:
          - security-headers
          - rate-limit-auth

    compress:
      compress:
        excludedContentTypes:
          - "text/event-stream"