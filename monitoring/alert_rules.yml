groups:
  - name: silexar_alerts
    rules:
      - alert: HighCPUUsage
        expr: cpu_usage_percent > 85
        for: 2m
        labels:
          severity: warning
          component: system
        annotations:
          summary: "High CPU usage detected"
          description: "CPU usage is above 85% for more than 2 minutes"

      - alert: CriticalCPUUsage
        expr: cpu_usage_percent > 95
        for: 1m
        labels:
          severity: critical
          component: system
        annotations:
          summary: "Critical CPU usage detected"
          description: "CPU usage is above 95% for more than 1 minute"

      - alert: HighMemoryUsage
        expr: memory_usage_percent > 90
        for: 3m
        labels:
          severity: warning
          component: system
        annotations:
          summary: "High memory usage detected"
          description: "Memory usage is above 90% for more than 3 minutes"

      - alert: CriticalMemoryUsage
        expr: memory_usage_percent > 95
        for: 1m
        labels:
          severity: critical
          component: system
        annotations:
          summary: "Critical memory usage detected"
          description: "Memory usage is above 95% for more than 1 minute"

      - alert: HighResponseTime
        expr: response_time_ms > 1000
        for: 5m
        labels:
          severity: warning
          component: performance
        annotations:
          summary: "High response time detected"
          description: "Average response time is above 1000ms for more than 5 minutes"

      - alert: CriticalResponseTime
        expr: response_time_ms > 2000
        for: 2m
        labels:
          severity: critical
          component: performance
        annotations:
          summary: "Critical response time detected"
          description: "Average response time is above 2000ms for more than 2 minutes"

      - alert: HighErrorRate
        expr: error_rate_percent > 5
        for: 3m
        labels:
          severity: warning
          component: reliability
        annotations:
          summary: "High error rate detected"
          description: "Error rate is above 5% for more than 3 minutes"

      - alert: CriticalErrorRate
        expr: error_rate_percent > 10
        for: 1m
        labels:
          severity: critical
          component: reliability
        annotations:
          summary: "Critical error rate detected"
          description: "Error rate is above 10% for more than 1 minute"

      - alert: LowCacheHitRate
        expr: cache_hit_rate_percent < 80
        for: 10m
        labels:
          severity: warning
          component: cache
        annotations:
          summary: "Low cache hit rate detected"
          description: "Cache hit rate is below 80% for more than 10 minutes"

      - alert: HighCacheEvictionRate
        expr: cache_evictions_per_minute > 100
        for: 5m
        labels:
          severity: warning
          component: cache
        annotations:
          summary: "High cache eviction rate detected"
          description: "Cache eviction rate is above 100 per minute for more than 5 minutes"

      - alert: LowMLConfidence
        expr: ml_prediction_confidence < 70
        for: 15m
        labels:
          severity: warning
          component: ml
        annotations:
          summary: "Low ML prediction confidence"
          description: "ML prediction confidence is below 70% for more than 15 minutes"

      - alert: Fortune10ScoreBelowTarget
        expr: fortune10_compliance_score < 90
        for: 30m
        labels:
          severity: warning
          component: compliance
        annotations:
          summary: "Fortune 10 compliance score below target"
          description: "Fortune 10 compliance score is below 90% for more than 30 minutes"

      - alert: SystemDowntime
        expr: system_availability < 99.9
        for: 1m
        labels:
          severity: critical
          component: availability
        annotations:
          summary: "System availability below SLA"
          description: "System availability is below 99.9%"

      - alert: HighActiveUsers
        expr: active_users > 10000
        for: 5m
        labels:
          severity: info
          component: usage
        annotations:
          summary: "High number of active users"
          description: "Active users count is above 10,000 for more than 5 minutes"

      - alert: ScalingFailure
        expr: scaling_operation_success == 0
        for: 1m
        labels:
          severity: critical
          component: scaling
        annotations:
          summary: "Auto-scaling operation failed"
          description: "Last auto-scaling operation failed"

      - alert: PredictiveScalingAlert
        expr: predicted_performance_degradation > 0.8
        for: 2m
        labels:
          severity: info
          component: ml
        annotations:
          summary: "Predictive scaling alert"
          description: "ML model predicts performance degradation with confidence > 80%"