# TIER 0 Horizontal Pod Autoscaler - Global Enterprise
# Revolutionary auto-scaling configuration for Fortune 10 operations
# Author: SILEXAR AI Team - Enterprise Infrastructure Division
# Version: 2040.7.0 - GLOBAL ENTERPRISE READY

apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: silexar-pulse-hpa
  namespace: silexar-pulse-production
  labels:
    app: silexar-pulse
    tier: tier-0
    environment: production
  annotations:
    autoscaling.alpha.kubernetes.io/conditions: '[{"type":"AbleToScale","status":"True","reason":"ReadyForNewScale"},{"type":"ScalingActive","status":"True","reason":"ValidMetricFound"},{"type":"ScalingLimited","status":"False","reason":"DesiredWithinRange"}]'
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: silexar-pulse-app
  
  # Scaling Configuration
  minReplicas: 10
  maxReplicas: 1000
  
  # Scaling Behavior
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
      - type: Percent
        value: 100
        periodSeconds: 60
      - type: Pods
        value: 10
        periodSeconds: 60
      selectPolicy: Max
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
      - type: Percent
        value: 10
        periodSeconds: 60
      - type: Pods
        value: 5
        periodSeconds: 60
      selectPolicy: Min
  
  # Metrics Configuration
  metrics:
  # CPU Utilization
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  
  # Memory Utilization
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
  
  # Custom Metrics - Requests per Second
  - type: Pods
    pods:
      metric:
        name: http_requests_per_second
      target:
        type: AverageValue
        averageValue: "1000"
  
  # Custom Metrics - Response Time
  - type: Pods
    pods:
      metric:
        name: http_response_time_p95
      target:
        type: AverageValue
        averageValue: "200m"
  
  # Custom Metrics - Queue Length
  - type: Pods
    pods:
      metric:
        name: queue_length
      target:
        type: AverageValue
        averageValue: "10"
  
  # External Metrics - Load Balancer Queue
  - type: External
    external:
      metric:
        name: load_balancer_queue_depth
        selector:
          matchLabels:
            service: silexar-pulse
      target:
        type: AverageValue
        averageValue: "50"

---
# Vertical Pod Autoscaler
apiVersion: autoscaling.k8s.io/v1
kind: VerticalPodAutoscaler
metadata:
  name: silexar-pulse-vpa
  namespace: silexar-pulse-production
  labels:
    app: silexar-pulse
    tier: tier-0
    environment: production
spec:
  targetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: silexar-pulse-app
  
  updatePolicy:
    updateMode: "Auto"
    minReplicas: 10
  
  resourcePolicy:
    containerPolicies:
    - containerName: silexar-pulse-app
      minAllowed:
        cpu: 500m
        memory: 1Gi
      maxAllowed:
        cpu: 4000m
        memory: 8Gi
      controlledResources: ["cpu", "memory"]
      controlledValues: RequestsAndLimits
    - containerName: log-shipper
      minAllowed:
        cpu: 50m
        memory: 64Mi
      maxAllowed:
        cpu: 200m
        memory: 256Mi
      controlledResources: ["cpu", "memory"]
      controlledValues: RequestsAndLimits

---
# Pod Disruption Budget
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: silexar-pulse-pdb
  namespace: silexar-pulse-production
  labels:
    app: silexar-pulse
    tier: tier-0
    environment: production
spec:
  minAvailable: 70%
  selector:
    matchLabels:
      app: silexar-pulse
      tier: tier-0

---
# Custom Resource Definition for Advanced Scaling
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: advancedautoscalers.scaling.silexar.com
spec:
  group: scaling.silexar.com
  versions:
  - name: v1
    served: true
    storage: true
    schema:
      openAPIV3Schema:
        type: object
        properties:
          spec:
            type: object
            properties:
              targetRef:
                type: object
                properties:
                  apiVersion:
                    type: string
                  kind:
                    type: string
                  name:
                    type: string
              minReplicas:
                type: integer
                minimum: 1
              maxReplicas:
                type: integer
                minimum: 1
              predictiveScaling:
                type: object
                properties:
                  enabled:
                    type: boolean
                  lookAheadMinutes:
                    type: integer
                    minimum: 1
                    maximum: 60
                  confidenceThreshold:
                    type: number
                    minimum: 0.0
                    maximum: 1.0
              aiOptimization:
                type: object
                properties:
                  enabled:
                    type: boolean
                  model:
                    type: string
                  features:
                    type: array
                    items:
                      type: string
          status:
            type: object
            properties:
              currentReplicas:
                type: integer
              desiredReplicas:
                type: integer
              lastScaleTime:
                type: string
                format: date-time
              conditions:
                type: array
                items:
                  type: object
                  properties:
                    type:
                      type: string
                    status:
                      type: string
                    reason:
                      type: string
                    message:
                      type: string
                    lastTransitionTime:
                      type: string
                      format: date-time
  scope: Namespaced
  names:
    plural: advancedautoscalers
    singular: advancedautoscaler
    kind: AdvancedAutoscaler
    shortNames:
    - aas

---
# Advanced Autoscaler Instance
apiVersion: scaling.silexar.com/v1
kind: AdvancedAutoscaler
metadata:
  name: silexar-pulse-advanced-scaler
  namespace: silexar-pulse-production
  labels:
    app: silexar-pulse
    tier: tier-0
    environment: production
spec:
  targetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: silexar-pulse-app
  
  minReplicas: 10
  maxReplicas: 1000
  
  predictiveScaling:
    enabled: true
    lookAheadMinutes: 15
    confidenceThreshold: 0.8
  
  aiOptimization:
    enabled: true
    model: "quantum-enhanced-v2"
    features:
    - "cpu_usage"
    - "memory_usage"
    - "request_rate"
    - "response_time"
    - "error_rate"
    - "queue_length"
    - "time_of_day"
    - "day_of_week"
    - "seasonal_patterns"