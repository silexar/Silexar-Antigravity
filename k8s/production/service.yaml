# Main Application Service
apiVersion: v1
kind: Service
metadata:
  name: silexar-pulse-service
  namespace: silexar-pulse-production
  labels:
    app: silexar-pulse
    tier: tier-0
    environment: production
    service-type: application
  annotations:
    service.beta.kubernetes.io/aws-load-balancer-type: "nlb"
    service.beta.kubernetes.io/aws-load-balancer-cross-zone-load-balancing-enabled: "true"
    service.beta.kubernetes.io/aws-load-balancer-backend-protocol: "http"
    service.beta.kubernetes.io/aws-load-balancer-healthcheck-path: "/api/health"
    service.beta.kubernetes.io/aws-load-balancer-healthcheck-interval: "10"
    service.beta.kubernetes.io/aws-load-balancer-healthcheck-timeout: "5"
    service.beta.kubernetes.io/aws-load-balancer-healthy-threshold: "2"
    service.beta.kubernetes.io/aws-load-balancer-unhealthy-threshold: "3"
    prometheus.io/scrape: "true"
    prometheus.io/port: "3000"
    prometheus.io/path: "/api/metrics"
spec:
  type: LoadBalancer
  sessionAffinity: ClientIP
  sessionAffinityConfig:
    clientIP:
      timeoutSeconds: 3600
  ports:
  - name: http
    port: 80
    targetPort: 3000
    protocol: TCP
  - name: https
    port: 443
    targetPort: 3000
    protocol: TCP
  selector:
    app: silexar-pulse
    tier: tier-0

---
# Internal Service for Inter-Service Communication
apiVersion: v1
kind: Service
metadata:
  name: silexar-pulse-internal
  namespace: silexar-pulse-production
  labels:
    app: silexar-pulse
    tier: tier-0
    environment: production
    service-type: internal
spec:
  type: ClusterIP
  ports:
  - name: http
    port: 3000
    targetPort: 3000
    protocol: TCP
  - name: metrics
    port: 9090
    targetPort: 9090
    protocol: TCP
  selector:
    app: silexar-pulse
    tier: tier-0

---
# Headless Service for StatefulSet (if needed)
apiVersion: v1
kind: Service
metadata:
  name: silexar-pulse-headless
  namespace: silexar-pulse-production
  labels:
    app: silexar-pulse
    tier: tier-0
    environment: production
    service-type: headless
spec:
  type: ClusterIP
  clusterIP: None
  ports:
  - name: http
    port: 3000
    targetPort: 3000
    protocol: TCP
  selector:
    app: silexar-pulse
    tier: tier-0

---
# Metrics Service for Prometheus
apiVersion: v1
kind: Service
metadata:
  name: silexar-pulse-metrics
  namespace: silexar-pulse-production
  labels:
    app: silexar-pulse
    tier: tier-0
    environment: production
    service-type: metrics
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "9090"
    prometheus.io/path: "/metrics"
spec:
  type: ClusterIP
  ports:
  - name: metrics
    port: 9090
    targetPort: 9090
    protocol: TCP
  selector:
    app: silexar-pulse
    tier: tier-0

---
# Global Load Balancer Service
apiVersion: v1
kind: Service
metadata:
  name: silexar-pulse-global-lb
  namespace: silexar-pulse-production
  labels:
    app: silexar-pulse
    tier: tier-0
    environment: production
    service-type: global-lb
  annotations:
    service.beta.kubernetes.io/aws-load-balancer-type: "nlb"
    service.beta.kubernetes.io/aws-load-balancer-scheme: "internet-facing"
    service.beta.kubernetes.io/aws-load-balancer-cross-zone-load-balancing-enabled: "true"
    service.beta.kubernetes.io/aws-load-balancer-connection-draining-enabled: "true"
    service.beta.kubernetes.io/aws-load-balancer-connection-draining-timeout: "60"
    service.beta.kubernetes.io/aws-load-balancer-ssl-cert: "arn:aws:acm:region:account:certificate/cert-id"
    service.beta.kubernetes.io/aws-load-balancer-ssl-ports: "https"
    service.beta.kubernetes.io/aws-load-balancer-backend-protocol: "http"
    external-dns.alpha.kubernetes.io/hostname: "app.silexar.com,api.silexar.com"
    external-dns.alpha.kubernetes.io/ttl: "60"
spec:
  type: LoadBalancer
  loadBalancerSourceRanges:
  - 0.0.0.0/0  # Allow from anywhere (adjust for security)
  ports:
  - name: http
    port: 80
    targetPort: 3000
    protocol: TCP
  - name: https
    port: 443
    targetPort: 3000
    protocol: TCP
  selector:
    app: silexar-pulse
    tier: tier-0

---
# Service Monitor for Prometheus Operator
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: silexar-pulse-monitor
  namespace: silexar-pulse-production
  labels:
    app: silexar-pulse
    tier: tier-0
    environment: production
    monitoring: prometheus
spec:
  selector:
    matchLabels:
      app: silexar-pulse
      service-type: metrics
  endpoints:
  - port: metrics
    path: /metrics
    interval: 15s
    scrapeTimeout: 10s
    honorLabels: true
    metricRelabelings:
    - sourceLabels: [__name__]
      regex: 'go_.*'
      action: drop
    - sourceLabels: [__name__]
      regex: 'process_.*'
      action: drop

---
# Network Policy for Service Security
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: silexar-pulse-network-policy
  namespace: silexar-pulse-production
  labels:
    app: silexar-pulse
    tier: tier-0
    environment: production
spec:
  podSelector:
    matchLabels:
      app: silexar-pulse
      tier: tier-0
  policyTypes:
  - Ingress
  - Egress
  
  ingress:
  # Allow traffic from load balancer
  - from:
    - namespaceSelector:
        matchLabels:
          name: kube-system
    ports:
    - protocol: TCP
      port: 3000
  
  # Allow traffic from monitoring
  - from:
    - namespaceSelector:
        matchLabels:
          name: monitoring
    ports:
    - protocol: TCP
      port: 9090
  
  # Allow traffic from same namespace
  - from:
    - namespaceSelector:
        matchLabels:
          name: silexar-pulse-production
    ports:
    - protocol: TCP
      port: 3000
    - protocol: TCP
      port: 9090
  
  egress:
  # Allow DNS resolution
  - to: []
    ports:
    - protocol: UDP
      port: 53
    - protocol: TCP
      port: 53
  
  # Allow HTTPS outbound
  - to: []
    ports:
    - protocol: TCP
      port: 443
  
  # Allow database connections
  - to:
    - namespaceSelector:
        matchLabels:
          name: database
    ports:
    - protocol: TCP
      port: 5432
  
  # Allow Redis connections
  - to:
    - namespaceSelector:
        matchLabels:
          name: cache
    ports:
    - protocol: TCP
      port: 6379

---
# Endpoint Slice for Advanced Load Balancing
apiVersion: discovery.k8s.io/v1
kind: EndpointSlice
metadata:
  name: silexar-pulse-endpoints
  namespace: silexar-pulse-production
  labels:
    app: silexar-pulse
    tier: tier-0
    environment: production
    kubernetes.io/service-name: silexar-pulse-service
addressType: IPv4
ports:
- name: http
  port: 3000
  protocol: TCP
- name: metrics
  port: 9090
  protocol: TCP
endpoints:
- addresses:
  - "10.0.1.10"
  - "10.0.1.11"
  - "10.0.1.12"
  conditions:
    ready: true
    serving: true
    terminating: false
  zone: "us-east-1a"
  hints:
    forZones:
    - name: "us-east-1a"
- addresses:
  - "10.0.2.10"
  - "10.0.2.11"
  - "10.0.2.12"
  conditions:
    ready: true
    serving: true
    terminating: false
  zone: "us-east-1b"
  hints:
    forZones:
    - name: "us-east-1b"