apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: silexar-pulse-ingress
  namespace: production
  annotations:
    kubernetes.io/ingress.class: "gce"
    kubernetes.io/ingress.global-static-ip-name: "silexar-pulse-lb-ip-production"
    networking.gke.io/managed-certificates: "silexar-pulse-cert"
    kubernetes.io/ingress.allow-http: "true"
    ingress.gcp.kubernetes.io/pre-shared-cert: "silexar-pulse-ssl-cert"
spec:
  rules:
  - host: app.silexar.com
    http:
      paths:
      - path: /*
        pathType: ImplementationSpecific
        backend:
          service:
            name: silexar-pulse
            port:
              number: 80
  - host: api.silexar.com
    http:
      paths:
      - path: /*
        pathType: ImplementationSpecific
        backend:
          service:
            name: silexar-pulse
            port:
              number: 80

---
apiVersion: networking.gke.io/v1
kind: ManagedCertificate
metadata:
  name: silexar-pulse-cert
  namespace: production
spec:
  domains:
  - app.silexar.com
  - api.silexar.com
  - www.silexar.com

---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: silexar-pulse-network-policy
  namespace: production
spec:
  podSelector:
    matchLabels:
      app: silexar-pulse
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          name: production
    - namespaceSelector:
        matchLabels:
          name: monitoring
    ports:
    - protocol: TCP
      port: 3000
    - protocol: TCP
      port: 9090
  egress:
  # Allow DNS
  - to:
    - namespaceSelector:
        matchLabels:
          name: kube-system
    ports:
    - protocol: UDP
      port: 53
  # Allow external HTTPS
  - to:
    - podSelector: {}
    ports:
    - protocol: TCP
      port: 443
  # Allow Cloud SQL
  - to:
    - podSelector: {}
    ports:
    - protocol: TCP
      port: 5432
  # Allow Redis
  - to:
    - podSelector: {}
    ports:
    - protocol: TCP
      port: 6379