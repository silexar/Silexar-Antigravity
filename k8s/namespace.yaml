# 🚀 Kubernetes Namespace for Silexar Pulse Quantum
# Production-ready namespace with resource quotas and network policies
# 
# @author SILEXAR AI Team
# @version 2040.1.0

apiVersion: v1
kind: Namespace
metadata:
  name: silexar-pulse-quantum
  labels:
    name: silexar-pulse-quantum
    environment: production
    team: silexar-ai
    version: "2040.1.0"
  annotations:
    description: "Silexar Pulse Quantum - Enterprise AI Advertising Platform"
    contact: "devops@silexar.com"

---
# Resource Quota
apiVersion: v1
kind: ResourceQuota
metadata:
  name: silexar-resource-quota
  namespace: silexar-pulse-quantum
spec:
  hard:
    requests.cpu: "4"
    requests.memory: 8Gi
    limits.cpu: "8"
    limits.memory: 16Gi
    persistentvolumeclaims: "10"
    services: "10"
    secrets: "20"
    configmaps: "20"
    pods: "20"

---
# Limit Range
apiVersion: v1
kind: LimitRange
metadata:
  name: silexar-limit-range
  namespace: silexar-pulse-quantum
spec:
  limits:
  - default:
      cpu: 500m
      memory: 512Mi
    defaultRequest:
      cpu: 100m
      memory: 128Mi
    type: Container
  - max:
      cpu: "2"
      memory: 2Gi
    min:
      cpu: 50m
      memory: 64Mi
    type: Container

---
# Network Policy
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: silexar-network-policy
  namespace: silexar-pulse-quantum
spec:
  podSelector: {}
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          name: ingress-nginx
    - namespaceSelector:
        matchLabels:
          name: monitoring
  egress:
  - to: []
    ports:
    - protocol: TCP
      port: 53
    - protocol: UDP
      port: 53
  - to:
    - namespaceSelector:
        matchLabels:
          name: kube-system
  - to: []
    ports:
    - protocol: TCP
      port: 443
    - protocol: TCP
      port: 80