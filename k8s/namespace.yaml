# 🏠 Kubernetes Namespace Configuration
# Production-ready namespace with resource quotas and network policies
# 
# @author SILEXAR AI Team
# @version 2040.1.0

apiVersion: v1
kind: Namespace
metadata:
  name: silexar-pulse-quantum
  labels:
    app: silexar-pulse-quantum
    environment: production
    istio-injection: enabled
  annotations:
    description: "Silexar Pulse Quantum production namespace"

---
# Staging Namespace
apiVersion: v1
kind: Namespace
metadata:
  name: silexar-staging
  labels:
    app: silexar-pulse-quantum
    environment: staging
  annotations:
    description: "Silexar Pulse Quantum staging namespace"

---
# Resource Quota for Production
apiVersion: v1
kind: ResourceQuota
metadata:
  name: silexar-quota
  namespace: silexar-pulse-quantum
spec:
  hard:
    requests.cpu: "10"
    requests.memory: 20Gi
    limits.cpu: "20"
    limits.memory: 40Gi
    pods: "50"
    services: "20"
    persistentvolumeclaims: "10"

---
# Limit Range for Production
apiVersion: v1
kind: LimitRange
metadata:
  name: silexar-limits
  namespace: silexar-pulse-quantum
spec:
  limits:
  - default:
      cpu: 1000m
      memory: 1Gi
    defaultRequest:
      cpu: 100m
      memory: 128Mi
    type: Container
  - max:
      storage: 100Gi
    min:
      storage: 1Gi
    type: PersistentVolumeClaim

---
# Network Policy - Deny All Ingress by Default
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-ingress
  namespace: silexar-pulse-quantum
spec:
  podSelector: {}
  policyTypes:
  - Ingress

---
# Network Policy - Allow Application Traffic
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-app-traffic
  namespace: silexar-pulse-quantum
spec:
  podSelector:
    matchLabels:
      app: silexar-pulse-quantum
  policyTypes:
  - Ingress
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          name: ingress-nginx
    - namespaceSelector:
        matchLabels:
          name: monitoring
    ports:
    - protocol: TCP
      port: 3000
  - from:
    - podSelector:
        matchLabels:
          app: silexar-pulse-quantum
    ports:
    - protocol: TCP
      port: 3000
