# 🌐 Kubernetes Services for Silexar Pulse Quantum
# Production-ready services with load balancing and monitoring
# 
# @author SILEXAR AI Team
# @version 2040.1.0

apiVersion: v1
kind: Service
metadata:
  name: silexar-pulse-quantum
  namespace: silexar-pulse-quantum
  labels:
    app: silexar-pulse-quantum
    component: application
  annotations:
    service.beta.kubernetes.io/aws-load-balancer-type: "nlb"
    service.beta.kubernetes.io/aws-load-balancer-backend-protocol: "http"
    service.beta.kubernetes.io/aws-load-balancer-healthcheck-path: "/api/health"
    service.beta.kubernetes.io/aws-load-balancer-healthcheck-interval: "10"
    service.beta.kubernetes.io/aws-load-balancer-healthcheck-timeout: "5"
    service.beta.kubernetes.io/aws-load-balancer-healthy-threshold: "2"
    service.beta.kubernetes.io/aws-load-balancer-unhealthy-threshold: "3"
    prometheus.io/scrape: "true"
    prometheus.io/port: "3000"
    prometheus.io/path: "/api/metrics"
spec:
  type: ClusterIP
  ports:
  - name: http
    port: 80
    targetPort: 3000
    protocol: TCP
  selector:
    app: silexar-pulse-quantum

---
# Headless Service for StatefulSet (if needed)
apiVersion: v1
kind: Service
metadata:
  name: silexar-pulse-quantum-headless
  namespace: silexar-pulse-quantum
  labels:
    app: silexar-pulse-quantum
    component: application
spec:
  clusterIP: None
  ports:
  - name: http
    port: 3000
    targetPort: 3000
    protocol: TCP
  selector:
    app: silexar-pulse-quantum

---
# Service Monitor for Prometheus
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: silexar-pulse-quantum-monitor
  namespace: silexar-pulse-quantum
  labels:
    app: silexar-pulse-quantum
    component: monitoring
spec:
  selector:
    matchLabels:
      app: silexar-pulse-quantum
  endpoints:
  - port: http
    path: /api/metrics
    interval: 30s
    scrapeTimeout: 10s
    honorLabels: true
  namespaceSelector:
    matchNames:
    - silexar-pulse-quantum