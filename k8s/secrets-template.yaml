# 🔐 Kubernetes Secrets Template
# SECRETS - DO NOT COMMIT ACTUAL VALUES
# Copy this file to secrets.yaml and fill in actual values
# Then apply with: kubectl apply -f k8s/secrets.yaml
# 
# @author SILEXAR AI Team
# @version 2040.1.0

apiVersion: v1
kind: Secret
metadata:
  name: silexar-secrets
  namespace: silexar-pulse-quantum
  labels:
    app: silexar-pulse-quantum
    component: secrets
type: Opaque
stringData:
  # Database
  database-url: "postgresql://user:password@postgres:5432/silexar_production?schema=public"
  
  # Redis
  redis-url: "redis://redis:6379"
  
  # Authentication
  jwt-secret: "your-jwt-secret-min-32-chars"
  nextauth-secret: "your-nextauth-secret-min-32-chars"
  nextauth-url: "https://silexar.io"
  
  # OAuth Providers (if used)
  google-client-id: ""
  google-client-secret: ""
  github-client-id: ""
  github-client-secret: ""
  
  # Email Service
  smtp-host: ""
  smtp-port: "587"
  smtp-user: ""
  smtp-password: ""
  email-from: "noreply@silexar.io"
  
  # External APIs
  api-key-internal: ""
  webhook-secret: ""
  
  # Encryption
  encryption-key: "your-encryption-key-32-chars"
  
  # Storage
  storage-access-key: ""
  storage-secret-key: ""
  storage-endpoint: ""
  storage-bucket: ""
  
  # Monitoring
  sentry-dsn: ""
  monitoring-api-key: ""
  
  # Notifications
  slack-webhook-url: ""
  discord-webhook-url: ""
  
  # Backup
  backup-encryption-key: ""
  backup-storage-url: ""

---
# TLS Secret Template (for custom TLS certificate)
apiVersion: v1
kind: Secret
metadata:
  name: silexar-tls
  namespace: silexar-pulse-quantum
type: kubernetes.io/tls
data:
  # Base64 encoded certificate and key
  tls.crt: ""
  tls.key: ""

---
# Docker Registry Secret (if using private registry)
apiVersion: v1
kind: Secret
metadata:
  name: regcred
  namespace: silexar-pulse-quantum
type: kubernetes.io/dockerconfigjson
data:
  .dockerconfigjson: ""
