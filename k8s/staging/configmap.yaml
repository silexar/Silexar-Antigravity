# TIER 0 ConfigMap for Continuous Improvement Staging
# Consciousness-level configuration management with quantum precision
apiVersion: v1
kind: ConfigMap
metadata:
  name: staging-config
  namespace: continuous-improvement-staging
  labels:
    app: continuous-improvement
    tier: "0"
    environment: staging
    component: configuration
    consciousness.level: "0.998"
    quantum.optimized: "true"
data:
  # TIER 0: Application Configuration
  app.yaml: |
    name: continuous-improvement-staging
    environment: staging
    version: "2040.1.0"
    consciousness:
      level: 0.998
      quantum_optimized: true
    features:
      staging_integration: true
      ai_powered_analysis: true
      quantum_optimization: true
      consciousness_enhancement: true
    
  # TIER 0: Database Configuration
  database.yaml: |
    type: postgresql
    pool_size: 20
    connection_timeout: 30000
    idle_timeout: 600000
    ssl_mode: require
    quantum_optimized: true
    
  # TIER 0: Redis Configuration  
  redis.yaml: |
    db: 0
    max_connections: 100
    connection_timeout: 5000
    command_timeout: 3000
    quantum_enhanced: true
    
  # TIER 0: Monitoring Configuration
  monitoring.yaml: |
    enabled: true
    metrics_interval: 5000
    alert_thresholds:
      cpu: 80
      memory: 85
      response_time: 1000
      error_rate: 5
    sentry:
      environment: staging
      traces_sample_rate: 0.1
      profiles_sample_rate: 0.1
    consciousness_tracking: true
    
  # TIER 0: Security Configuration
  security.yaml: |
    cors_origins:
      - "https://staging.silexar.com"
      - "https://staging-ci.silexar.com"
    rate_limiting:
      enabled: true
      window: 60000
      max_requests: 1000
    encryption:
      algorithm: "aes-256-gcm"
      quantum_enhanced: true
    
  # TIER 0: Deployment Configuration
  deployment.yaml: |
    strategy: blue-green
    health_check:
      path: "/api/health"
      timeout: 5000
      interval: 30000
    readiness_probe:
      path: "/api/ready"
      timeout: 3000
      interval: 5000
    startup_probe:
      path: "/api/health"
      timeout: 5000
      interval: 10000
      failure_threshold: 30
    quantum_deployment: true
    
  # TIER 0: Logging Configuration
  logging.yaml: |
    level: info
    format: json
    outputs:
      - console
      - file
    file:
      path: "/app/logs/application.log"
      max_size: "100MB"
      max_files: 10
      compress: true
    consciousness_logging: true
    quantum_enhanced: true