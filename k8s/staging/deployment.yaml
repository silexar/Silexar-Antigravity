# TIER 0 Kubernetes Deployment for Continuous Improvement Staging
# Revolutionary deployment with consciousness-level orchestration
apiVersion: apps/v1
kind: Deployment
metadata:
  name: continuous-improvement-staging
  namespace: continuous-improvement-staging
  labels:
    app: continuous-improvement
    tier: "0"
    environment: staging
    component: application
    consciousness.level: "0.998"
    quantum.optimized: "true"
  annotations:
    deployment.kubernetes.io/revision: "1"
    description: "TIER 0 Continuous Improvement Staging Application"
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  selector:
    matchLabels:
      app: continuous-improvement
      environment: staging
  template:
    metadata:
      labels:
        app: continuous-improvement
        tier: "0"
        environment: staging
        component: application
        consciousness.level: "0.998"
        quantum.optimized: "true"
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "3000"
        prometheus.io/path: "/api/metrics"
    spec:
      serviceAccountName: continuous-improvement-staging
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        runAsGroup: 1001
        fsGroup: 1001
      containers:
      - name: continuous-improvement
        image: silexar/continuous-improvement-staging:latest
        imagePullPolicy: Always
        ports:
        - name: http
          containerPort: 3000
          protocol: TCP
        env:
        - name: NODE_ENV
          value: "staging"
        - name: ENVIRONMENT
          value: "staging"
        - name: CONSCIOUSNESS_LEVEL
          value: "0.998"
        - name: QUANTUM_OPTIMIZED
          value: "true"
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: staging-secrets
              key: database-url
        - name: REDIS_URL
          valueFrom:
            secretKeyRef:
              name: staging-secrets
              key: redis-url
        - name: SENTRY_DSN
          valueFrom:
            secretKeyRef:
              name: staging-secrets
              key: sentry-dsn
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: staging-secrets
              key: jwt-secret
        resources:
          requests:
            cpu: 500m
            memory: 1Gi
          limits:
            cpu: 2
            memory: 4Gi
        livenessProbe:
          httpGet:
            path: /api/health
            port: http
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /api/ready
            port: http
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
        startupProbe:
          httpGet:
            path: /api/health
            port: http
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 30
        volumeMounts:
        - name: config-volume
          mountPath: /app/config
          readOnly: true
        - name: logs-volume
          mountPath: /app/logs
      volumes:
      - name: config-volume
        configMap:
          name: staging-config
      - name: logs-volume
        emptyDir: {}
      nodeSelector:
        kubernetes.io/arch: amd64
      tolerations:
      - key: "staging"
        operator: "Equal"
        value: "true"
        effect: "NoSchedule"
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app
                  operator: In
                  values:
                  - continuous-improvement
              topologyKey: kubernetes.io/hostname