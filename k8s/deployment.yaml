# 🚀 Kubernetes Deployment for Silexar Pulse Quantum
# Production-ready deployment with auto-scaling, health checks, and monitoring
# 
# @author SILEXAR AI Team
# @version 2040.1.0

apiVersion: apps/v1
kind: Deployment
metadata:
  name: silexar-pulse-quantum
  namespace: silexar-pulse-quantum
  labels:
    app: silexar-pulse-quantum
    version: "2040.1.0"
    component: application
  annotations:
    deployment.kubernetes.io/revision: "1"
    description: "Silexar Pulse Quantum main application deployment"
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: silexar-pulse-quantum
  template:
    metadata:
      labels:
        app: silexar-pulse-quantum
        version: "2040.1.0"
        component: application
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "3000"
        prometheus.io/path: "/api/metrics"
    spec:
      serviceAccountName: silexar-service-account
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        fsGroup: 1001
      containers:
      - name: silexar-app
        image: ghcr.io/silexar/pulse-quantum:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 3000
          name: http
          protocol: TCP
        envFrom:
        - configMapRef:
            name: silexar-config
            optional: false
        env:
        - name: NODE_ENV
          value: "production"
        - name: PORT
          value: "3000"
        - name: REDIS_URL
          valueFrom:
            secretKeyRef:
              name: silexar-secrets
              key: redis-url
              optional: false
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: silexar-secrets
              key: database-url
              optional: false
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: silexar-secrets
              key: jwt-secret
              optional: false
        - name: NEXTAUTH_SECRET
          valueFrom:
            secretKeyRef:
              name: silexar-secrets
              key: nextauth-secret
              optional: false
        - name: NEXTAUTH_URL
          valueFrom:
            secretKeyRef:
              name: silexar-secrets
              key: nextauth-url
              optional: false
        - name: ENCRYPTION_KEY
          valueFrom:
            secretKeyRef:
              name: silexar-secrets
              key: encryption-key
              optional: true
        - name: SENTRY_DSN
          valueFrom:
            secretKeyRef:
              name: silexar-secrets
              key: sentry-dsn
              optional: true
        - name: PROMETHEUS_METRICS
          value: "true"
        - name: JAEGER_ENDPOINT
          value: "http://jaeger-collector.monitoring.svc.cluster.local:14268/api/traces"
        resources:
          requests:
            cpu: 200m
            memory: 256Mi
          limits:
            cpu: 1000m
            memory: 1Gi
        livenessProbe:
          httpGet:
            path: /api/health
            port: 3000
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
          successThreshold: 1
        readinessProbe:
          httpGet:
            path: /api/health/ready
            port: 3000
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
          successThreshold: 1
        startupProbe:
          httpGet:
            path: /api/health
            port: 3000
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 30
          successThreshold: 1
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          runAsNonRoot: true
          runAsUser: 1001
          capabilities:
            drop:
            - ALL
        volumeMounts:
        - name: tmp
          mountPath: /tmp
        - name: cache
          mountPath: /app/.next/cache
      volumes:
      - name: tmp
        emptyDir:
          medium: Memory
          sizeLimit: 100Mi
      - name: cache
        emptyDir:
          medium: Memory
          sizeLimit: 500Mi
      nodeSelector:
        kubernetes.io/os: linux
      tolerations:
      - key: "node.kubernetes.io/not-ready"
        operator: "Exists"
        effect: "NoExecute"
        tolerationSeconds: 300
      - key: "node.kubernetes.io/unreachable"
        operator: "Exists"
        effect: "NoExecute"
        tolerationSeconds: 300
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app
                  operator: In
                  values:
                  - silexar-pulse-quantum
              topologyKey: kubernetes.io/hostname

---
# Horizontal Pod Autoscaler
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: silexar-pulse-quantum-hpa
  namespace: silexar-pulse-quantum
  labels:
    app: silexar-pulse-quantum
    component: autoscaling
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: silexar-pulse-quantum
  minReplicas: 3
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
      - type: Percent
        value: 10
        periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
      - type: Percent
        value: 50
        periodSeconds: 60
      - type: Pods
        value: 2
        periodSeconds: 60
      selectPolicy: Max

---
# Pod Disruption Budget
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: silexar-pulse-quantum-pdb
  namespace: silexar-pulse-quantum
  labels:
    app: silexar-pulse-quantum
    component: pdb
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app: silexar-pulse-quantum

---
# Service Account
apiVersion: v1
kind: ServiceAccount
metadata:
  name: silexar-service-account
  namespace: silexar-pulse-quantum
  labels:
    app: silexar-pulse-quantum
    component: rbac
automountServiceAccountToken: false
