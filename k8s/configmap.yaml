# ⚙️ Kubernetes ConfigMap Configuration
# Application configuration and environment variables (non-sensitive)
# 
# @author SILEXAR AI Team
# @version 2040.1.0

apiVersion: v1
kind: ConfigMap
metadata:
  name: silexar-config
  namespace: silexar-pulse-quantum
  labels:
    app: silexar-pulse-quantum
    component: config
data:
  # Application Settings
  NODE_ENV: "production"
  PORT: "3000"
  NEXT_TELEMETRY_DISABLED: "1"
  
  # Feature Flags
  ENABLE_ANALYTICS: "true"
  ENABLE_NOTIFICATIONS: "true"
  ENABLE_WEBSOCKETS: "true"
  
  # Performance Settings
  NEXT_OPTIMIZE_FONTS: "true"
  NEXT_OPTIMIZE_IMAGES: "true"
  
  # Monitoring & Observability
  PROMETHEUS_METRICS: "true"
  METRICS_PORT: "3000"
  METRICS_PATH: "/api/metrics"
  ENABLE_TRACING: "true"
  JAEGER_ENDPOINT: "http://jaeger-collector.monitoring.svc.cluster.local:14268/api/traces"
  
  # Logging
  LOG_LEVEL: "info"
  LOG_FORMAT: "json"
  
  # Security Headers
  SECURITY_HEADERS_ENABLED: "true"
  CORS_MAX_AGE: "86400"
  
  # Cache Settings
  CACHE_TTL: "3600"
  CACHE_MAX_SIZE: "1000"
  
  # Rate Limiting
  RATE_LIMIT_ENABLED: "true"
  RATE_LIMIT_WINDOW_MS: "900000"
  RATE_LIMIT_MAX_REQUESTS: "100"

---
# Nginx ConfigMap
apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-config
  namespace: silexar-pulse-quantum
data:
  nginx.conf: |
    user nginx;
    worker_processes auto;
    error_log /var/log/nginx/error.log warn;
    pid /var/run/nginx.pid;
    
    events {
        worker_connections 1024;
    }
    
    http {
        include /etc/nginx/mime.types;
        default_type application/octet-stream;
        
        log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                        '$status $body_bytes_sent "$http_referer" '
                        '"$http_user_agent" "$http_x_forwarded_for"';
        
        access_log /var/log/nginx/access.log main;
        
        sendfile on;
        tcp_nopush on;
        tcp_nodelay on;
        keepalive_timeout 65;
        types_hash_max_size 2048;
        
        # Gzip compression
        gzip on;
        gzip_vary on;
        gzip_proxied any;
        gzip_comp_level 6;
        gzip_types text/plain text/css text/xml application/json application/javascript 
                   application/rss+xml application/atom+xml image/svg+xml;
        
        upstream app {
            server silexar-pulse-quantum:3000;
        }
        
        server {
            listen 80;
            server_name _;
            
            location / {
                proxy_pass http://app;
                proxy_http_version 1.1;
                proxy_set_header Upgrade $http_upgrade;
                proxy_set_header Connection 'upgrade';
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto $scheme;
                proxy_cache_bypass $http_upgrade;
                proxy_read_timeout 86400;
            }
            
            location /health {
                access_log off;
                return 200 "healthy\n";
                add_header Content-Type text/plain;
            }
        }
    }
