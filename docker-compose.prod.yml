# 🌟 SILEXAR PULSE QUANTUM - Production Docker Compose
# Version: TIER 0 Production Ready
# Military-Grade Production Deployment

version: '3.8'

services:
  # ================================
  # Main Application
  # ================================
  app:
    build:
      context: .
      dockerfile: Dockerfile.production
      args:
        - NODE_ENV=production
    image: silexar-pulse-quantum:production
    container_name: silexar-app-prod
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=${DATABASE_URL_PRODUCTION}
      - REDIS_URL=${REDIS_URL_PRODUCTION}
      - JWT_SECRET=${JWT_SECRET}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - MONITORING_API_KEY=${MONITORING_API_KEY}
      - BACKUP_STORAGE_URL=${BACKUP_STORAGE_URL}
      - CORS_ORIGINS=${CORS_ORIGINS}
      - CDN_DOMAIN=${CDN_DOMAIN}
      - SLACK_WEBHOOK_URL=${SLACK_WEBHOOK_URL}
    volumes:
      - app-logs:/app/logs
      - app-uploads:/app/uploads
      - app-backups:/app/backups
    networks:
      - silexar-network
    depends_on:
      - redis
      - postgres
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 4G
        reservations:
          cpus: '1.0'
          memory: 2G
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.silexar.rule=Host(`yourdomain.com`)"
      - "traefik.http.routers.silexar.tls=true"
      - "traefik.http.routers.silexar.tls.certresolver=letsencrypt"
      - "traefik.http.routers.silexar.tls.options=default"
      # Apply security headers + general rate limit to all app routes
      - "traefik.http.routers.silexar.middlewares=default-chain@file,compress@file"
      # Separate router for auth routes with stricter rate limiting
      - "traefik.http.routers.silexar-auth.rule=Host(`yourdomain.com`) && PathPrefix(`/api/auth`)"
      - "traefik.http.routers.silexar-auth.tls=true"
      - "traefik.http.routers.silexar-auth.tls.certresolver=letsencrypt"
      - "traefik.http.routers.silexar-auth.middlewares=auth-chain@file"
      - "traefik.http.routers.silexar-auth.priority=10"
      - "traefik.http.services.silexar.loadbalancer.server.port=3000"
      - "traefik.http.services.silexar.loadbalancer.healthcheck.path=/api/health"
      - "traefik.http.services.silexar.loadbalancer.healthcheck.interval=30s"

  # ================================
  # PostgreSQL Database
  # ================================
  postgres:
    image: postgres:15-alpine
    container_name: silexar-postgres-prod
    restart: unless-stopped
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-silexar_production}
      - POSTGRES_USER=${POSTGRES_USER:-silexar}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_INITDB_ARGS=--auth-host=scram-sha-256
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro
    networks:
      - silexar-network
    # DB and Redis are only accessible via internal Docker network for security
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-silexar} -d ${POSTGRES_DB:-silexar_production}"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 1G
    command: >
      postgres
      -c max_connections=200
      -c shared_buffers=256MB
      -c effective_cache_size=1GB
      -c maintenance_work_mem=64MB
      -c checkpoint_completion_target=0.9
      -c wal_buffers=16MB
      -c default_statistics_target=100
      -c random_page_cost=1.1
      -c effective_io_concurrency=200
      -c work_mem=4MB
      -c min_wal_size=1GB
      -c max_wal_size=4GB

  # ================================
  # Redis Cache
  # ================================
  redis:
    image: redis:7-alpine
    container_name: silexar-redis-prod
    restart: unless-stopped
    command: >
      redis-server
      --appendonly yes
      --appendfsync everysec
      --maxmemory 2gb
      --maxmemory-policy allkeys-lru
      --tcp-keepalive 60
      --timeout 300
    volumes:
      - redis-data:/data
      - ./config/redis.conf:/usr/local/etc/redis/redis.conf:ro
    networks:
      - silexar-network
    # DB and Redis are only accessible via internal Docker network for security
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 2G
        reservations:
          cpus: '0.25'
          memory: 1G

  # ================================
  # Nginx Reverse Proxy
  # ================================
  nginx:
    image: nginx:alpine
    container_name: silexar-nginx-prod
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./config/nginx.prod.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
      - nginx-logs:/var/log/nginx
    networks:
      - silexar-network
    depends_on:
      - app
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.1'
          memory: 128M

  # ================================
  # Monitoring - Prometheus
  # ================================
  prometheus:
    image: prom/prometheus:latest
    container_name: silexar-prometheus-prod
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./config/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    networks:
      - silexar-network
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=90d'
      - '--web.enable-lifecycle'
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 1G
        reservations:
          cpus: '0.25'
          memory: 512M

  # ================================
  # Monitoring - Grafana
  # ================================
  grafana:
    image: grafana/grafana:latest
    container_name: silexar-grafana-prod
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:?GRAFANA_ADMIN_PASSWORD environment variable is required}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_DOMAIN=${GRAFANA_DOMAIN:-localhost}
      - GF_SMTP_ENABLED=true
      - GF_SMTP_HOST=${SMTP_HOST}
      - GF_SMTP_USER=${SMTP_USER}
      - GF_SMTP_PASSWORD=${SMTP_PASSWORD}
    volumes:
      - grafana-data:/var/lib/grafana
      - ./config/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./config/grafana/datasources:/etc/grafana/provisioning/datasources:ro
    networks:
      - silexar-network
    depends_on:
      - prometheus
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M

  # ================================
  # Log Management - ELK Stack
  # ================================
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.0
    container_name: silexar-elasticsearch-prod
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - "ES_JAVA_OPTS=-Xms1g -Xmx1g"
      - xpack.security.enabled=true
      - xpack.security.authc.api_key.enabled=true
      - ELASTIC_PASSWORD=${ELASTIC_PASSWORD:?ERROR: ELASTIC_PASSWORD must be set in environment — never use a default password in production}
    volumes:
      - elasticsearch-data:/usr/share/elasticsearch/data
    networks:
      - silexar-network
    ports:
      - "127.0.0.1:9200:9200"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 1G

  logstash:
    image: docker.elastic.co/logstash/logstash:8.11.0
    container_name: silexar-logstash-prod
    restart: unless-stopped
    volumes:
      - ./config/logstash/pipeline:/usr/share/logstash/pipeline:ro
      - ./config/logstash/config:/usr/share/logstash/config:ro
      - app-logs:/usr/share/logstash/logs:ro
    networks:
      - silexar-network
    depends_on:
      - elasticsearch
    ports:
      - "127.0.0.1:5044:5044"
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 1G
        reservations:
          cpus: '0.25'
          memory: 512M

  kibana:
    image: docker.elastic.co/kibana/kibana:8.11.0
    container_name: silexar-kibana-prod
    restart: unless-stopped
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
      - SERVER_NAME=kibana
      - SERVER_HOST=0.0.0.0
    networks:
      - silexar-network
    ports:
      - "127.0.0.1:5601:5601"
    depends_on:
      - elasticsearch
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:5601/api/status || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 1G
        reservations:
          cpus: '0.25'
          memory: 512M

  # ================================
  # Backup Service
  # ================================
  backup:
    image: silexar-pulse-quantum:production
    container_name: silexar-backup-prod
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - DATABASE_URL=${DATABASE_URL_PRODUCTION}
      - BACKUP_STORAGE_URL=${BACKUP_STORAGE_URL}
      - BACKUP_SCHEDULE_FULL=${BACKUP_SCHEDULE_FULL:-0 2 * * *}
      - BACKUP_SCHEDULE_INCREMENTAL=${BACKUP_SCHEDULE_INCREMENTAL:-*/15 * * * *}
    volumes:
      - app-backups:/app/backups
      - postgres-data:/data/postgres:ro
      - redis-data:/data/redis:ro
    networks:
      - silexar-network
    depends_on:
      - postgres
      - redis
    command: ["node", "scripts/backup-service.js"]
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 512M
        reservations:
          cpus: '0.1'
          memory: 256M

# ================================
# Networks
# ================================
networks:
  silexar-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

# ================================
# Volumes
# ================================
volumes:
  postgres-data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /var/lib/silexar/postgres
  
  redis-data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /var/lib/silexar/redis
  
  elasticsearch-data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /var/lib/silexar/elasticsearch
  
  prometheus-data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /var/lib/silexar/prometheus
  
  grafana-data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /var/lib/silexar/grafana
  
  app-logs:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /var/log/silexar
  
  app-uploads:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /var/lib/silexar/uploads
  
  app-backups:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /var/lib/silexar/backups
  
  nginx-logs:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /var/log/nginx