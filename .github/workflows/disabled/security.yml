name: Security Audit
on:
  schedule:
    - cron: "0 6 * * 1" # Weekly Monday 6am UTC
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

permissions:
  contents: read
  security-events: write

jobs:
  npm-audit:
    name: npm audit (high/critical block)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
      - run: npm ci --ignore-scripts
      - name: npm audit — fail on high/critical
        run: npm audit --production --audit-level=high

  secrets-scan:
    name: Secrets Detection
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Scan for hardcoded secrets
        run: |
          # Check for common secret patterns in source files
          if grep -rEn \
            "(PRIVATE_KEY|AWS_SECRET_ACCESS_KEY|VERCEL_TOKEN|STRIPE_SECRET|sk-[a-zA-Z0-9]{20,}|eyJ[a-zA-Z0-9_-]{20,})" \
            --include="*.ts" --include="*.tsx" --include="*.js" --include="*.json" \
            --exclude-dir=".next" --exclude-dir="node_modules" --exclude-dir=".git" \
            src/ terraform/ 2>/dev/null; then
            echo "::error::Potential secrets found in source files"
            exit 1
          fi
          echo "No hardcoded secrets detected"

  trivy-scan:
    name: Trivy Vulnerability Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: "fs"
          scan-ref: "."
          format: "sarif"
          output: "trivy-results.sarif"
          exit-code: "1"
          severity: "HIGH,CRITICAL"
          ignore-unfixed: true
      - name: Upload Trivy results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: "trivy-results.sarif"

  typescript-check:
    name: TypeScript strict compilation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
      - run: npm ci --ignore-scripts
      - name: TypeScript — zero errors required
        run: npx tsc --noEmit
