name: 📊 Security Report

on:
  schedule:
    # Run daily at 6:00 AM UTC
    - cron: '0 6 * * *'
  workflow_dispatch:

env:
  NODE_VERSION: '20'
  SECURITY_SCORE_THRESHOLD: '8.0'

jobs:
  # ==========================================
  # Generate Security Report
  # ==========================================
  generate-report:
    name: 📊 Generate Security Report
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      issues: write
      security-events: read
    
    outputs:
      security_score: ${{ steps.calculate_score.outputs.score }}
      critical_count: ${{ steps.vuln_count.outputs.critical }}
      high_count: ${{ steps.vuln_count.outputs.high }}
      score_below_threshold: ${{ steps.calculate_score.outputs.below_threshold }}
      new_vulnerabilities: ${{ steps.check_new.outputs.has_new }}
    
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          
      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          
      - name: 📦 Install Dependencies
        run: npm ci --prefer-offline --no-audit
        
      - name: 🔍 NPM Security Audit
        id: npm_audit
        run: |
          npm audit --json > security-report.json || EXIT_CODE=$?
          
          # Extract vulnerability counts
          CRITICAL=$(cat security-report.json | jq -r '.metadata.vulnerabilities.critical // 0')
          HIGH=$(cat security-report.json | jq -r '.metadata.vulnerabilities.high // 0')
          MODERATE=$(cat security-report.json | jq -r '.metadata.vulnerabilities.moderate // 0')
          LOW=$(cat security-report.json | jq -r '.metadata.vulnerabilities.low // 0')
          INFO=$(cat security-report.json | jq -r '.metadata.vulnerabilities.info // 0')
          TOTAL_DEPS=$(cat security-report.json | jq -r '.metadata.totalDependencies // 0')
          
          echo "critical=$CRITICAL" >> $GITHUB_OUTPUT
          echo "high=$HIGH" >> $GITHUB_OUTPUT
          echo "moderate=$MODERATE" >> $GITHUB_OUTPUT
          echo "low=$LOW" >> $GITHUB_OUTPUT
          echo "info=$INFO" >> $GITHUB_OUTPUT
          echo "total_deps=$TOTAL_DEPS" >> $GITHUB_OUTPUT
          
          echo "📊 Vulnerability Summary:"
          echo "  Critical: $CRITICAL"
          echo "  High: $HIGH"
          echo "  Moderate: $MODERATE"
          echo "  Low: $LOW"
          echo "  Info: $INFO"
          echo "  Total Deps: $TOTAL_DEPS"
          
      - name: 🧮 Calculate Security Score
        id: calculate_score
        run: |
          CRITICAL=${{ steps.npm_audit.outputs.critical }}
          HIGH=${{ steps.npm_audit.outputs.high }}
          MODERATE=${{ steps.npm_audit.outputs.moderate }}
          LOW=${{ steps.npm_audit.outputs.low }}
          TOTAL_DEPS=${{ steps.npm_audit.outputs.total_deps }}
          
          # Calculate security score (0-10)
          # Start with 10, subtract points for vulnerabilities
          # Critical: -2, High: -1, Moderate: -0.5, Low: -0.1
          SCORE=$(echo "scale=2; 10 - ($CRITICAL * 2) - ($HIGH * 1) - ($MODERATE * 0.5) - ($LOW * 0.1)" | bc)
          
          # Ensure score doesn't go below 0
          if (( $(echo "$SCORE < 0" | bc -l) )); then
            SCORE="0.00"
          fi
          
          echo "score=$SCORE" >> $GITHUB_OUTPUT
          echo "📊 Security Score: $SCORE/10"
          
          # Check if below threshold
          BELOW_THRESHOLD=$(echo "$SCORE < ${{ env.SECURITY_SCORE_THRESHOLD }}" | bc)
          echo "below_threshold=$BELOW_THRESHOLD" >> $GITHUB_OUTPUT
          
          if [ "$BELOW_THRESHOLD" -eq 1 ]; then
            echo "⚠️ Security score ($SCORE) is below threshold (${{ env.SECURITY_SCORE_THRESHOLD }})"
          else
            echo "✅ Security score ($SCORE) meets threshold (${{ env.SECURITY_SCORE_THRESHOLD }})"
          fi
          
      - name: 📋 Count Vulnerabilities
        id: vuln_count
        run: |
          echo "critical=${{ steps.npm_audit.outputs.critical }}" >> $GITHUB_OUTPUT
          echo "high=${{ steps.npm_audit.outputs.high }}" >> $GITHUB_OUTPUT
          echo "moderate=${{ steps.npm_audit.outputs.moderate }}" >> $GITHUB_OUTPUT
          echo "low=${{ steps.npm_audit.outputs.low }}" >> $GITHUB_OUTPUT
          
      - name: 🔍 Check for New Vulnerabilities
        id: check_new
        run: |
          # Download previous report if exists
          PREVIOUS_REPORT="previous-security-report.json"
          
          # Try to get the artifact from previous runs
          gh run list --workflow="security-report.yml" --limit 2 --json databaseId --jq '.[1].databaseId' 2>/dev/null | while read run_id; do
            if [ -n "$run_id" ]; then
              echo "Checking run $run_id for previous report..."
              gh run download "$run_id" -n security-report 2>/dev/null && break
            fi
          done || true
          
          HAS_NEW="false"
          
          if [ -f "$PREVIOUS_REPORT" ]; then
            PREV_CRITICAL=$(cat "$PREVIOUS_REPORT" | jq -r '.metadata.vulnerabilities.critical // 0')
            PREV_HIGH=$(cat "$PREVIOUS_REPORT" | jq -r '.metadata.vulnerabilities.high // 0')
            
            CURRENT_CRITICAL=${{ steps.npm_audit.outputs.critical }}
            CURRENT_HIGH=${{ steps.npm_audit.outputs.high }}
            
            if [ "$CURRENT_CRITICAL" -gt "$PREV_CRITICAL" ] || [ "$CURRENT_HIGH" -gt "$PREV_HIGH" ]; then
              HAS_NEW="true"
              echo "⚠️ New vulnerabilities detected!"
              echo "  Critical: $PREV_CRITICAL → $CURRENT_CRITICAL"
              echo "  High: $PREV_HIGH → $CURRENT_HIGH"
            else
              echo "✅ No new high/critical vulnerabilities"
            fi
          else
            echo "ℹ️ No previous report found for comparison"
            # If we have any critical or high, consider them as new
            if [ "${{ steps.npm_audit.outputs.critical }}" -gt 0 ] || [ "${{ steps.npm_audit.outputs.high }}" -gt 0 ]; then
              HAS_NEW="true"
            fi
          fi
          
          echo "has_new=$HAS_NEW" >> $GITHUB_OUTPUT
          
          # Save current report for next comparison
          cp security-report.json "$PREVIOUS_REPORT"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          
      - name: 📄 Generate Markdown Report
        run: |
          SCORE=${{ steps.calculate_score.outputs.score }}
          THRESHOLD=${{ env.SECURITY_SCORE_THRESHOLD }}
          
          # Determine score badge
          if (( $(echo "$SCORE >= 9" | bc -l) )); then
            SCORE_BADGE="🟢 EXCELLENT"
          elif (( $(echo "$SCORE >= 7" | bc -l) )); then
            SCORE_BADGE="🟡 GOOD"
          elif (( $(echo "$SCORE >= 5" | bc -l) )); then
            SCORE_BADGE="🟠 FAIR"
          else
            SCORE_BADGE="🔴 POOR"
          fi
          
          cat > SECURITY_REPORT.md << EOF
          # 📊 Daily Security Report
          
          **Generated:** $(date -u +"%Y-%m-%d %H:%M:%S UTC")  
          **Repository:** ${{ github.repository }}  
          **Branch:** main  
          **Commit:** ${{ github.sha }}
          
          ---
          
          ## 🎯 Security Score: $SCORE / 10
          
          **Rating:** $SCORE_BADGE
          
          $(if (( $(echo "$SCORE < $THRESHOLD" | bc -l) )); then echo "⚠️ **ALERT:** Score is below threshold ($THRESHOLD)"; fi)
          
          ---
          
          ## 🔍 Vulnerability Summary
          
          | Severity | Count | Status |
          |----------|-------|--------|
          | 🔴 Critical | ${{ steps.npm_audit.outputs.critical }} | ${{ steps.npm_audit.outputs.critical > 0 && '❌' || '✅' }} |
          | 🟠 High | ${{ steps.npm_audit.outputs.high }} | ${{ steps.npm_audit.outputs.high > 0 && '⚠️' || '✅' }} |
          | 🟡 Moderate | ${{ steps.npm_audit.outputs.moderate }} | - |
          | 🔵 Low | ${{ steps.npm_audit.outputs.low }} | - |
          | ⚪ Info | ${{ steps.npm_audit.outputs.info }} | - |
          
          **Total Dependencies:** ${{ steps.npm_audit.outputs.total_deps }}
          
          ---
          
          ## 📈 Trend Analysis
          
          $(if [ "${{ steps.check_new.outputs.has_new }}" == "true" ]; then 
            echo "⚠️ **New vulnerabilities detected since last scan**"; 
          else 
            echo "✅ **No new high/critical vulnerabilities**"; 
          fi)
          
          ---
          
          ## 🔗 Quick Links
          
          - [Security Settings](${{ github.server_url }}/${{ github.repository }}/security)
          - [Dependabot Alerts](${{ github.server_url }}/${{ github.repository }}/security/dependabot)
          - [Code Scanning](${{ github.server_url }}/${{ github.repository }}/security/code-scanning)
          - [Workflow Runs](${{ github.server_url }}/${{ github.repository }}/actions/workflows/security-report.yml)
          
          ---
          
          *This report was automatically generated by the Security Report workflow.*
          EOF
          
          cat SECURITY_REPORT.md
          
      - name: 📤 Upload Report Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: security-report
          path: |
            security-report.json
            SECURITY_REPORT.md
            previous-security-report.json
          retention-days: 90
          overwrite: true

  # ==========================================
  # Create Issue for New Vulnerabilities
  # ==========================================
  create-issue:
    name: 📝 Create Security Issue
    runs-on: ubuntu-latest
    needs: generate-report
    if: |
      (needs.generate-report.outputs.new_vulnerabilities == 'true' || 
       needs.generate-report.outputs.critical_count > 0) && 
      github.event_name == 'schedule'
    timeout-minutes: 10
    permissions:
      issues: write
    
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4
        
      - name: 🔍 Check for Existing Issue
        id: check_issue
        uses: actions/github-script@v7
        with:
          script: |
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'security,automated',
              per_page: 10
            });
            
            const existingIssue = issues.find(issue => 
              issue.title.includes('🔒 Security Alert') &&
              !issue.title.includes('[RESOLVED]')
            );
            
            if (existingIssue) {
              console.log(`Found existing issue #${existingIssue.number}`);
              core.setOutput('issue_number', existingIssue.number);
              core.setOutput('has_existing', 'true');
            } else {
              core.setOutput('has_existing', 'false');
            }
            
      - name: 📝 Create New Issue
        if: steps.check_issue.outputs.has_existing == 'false'
        uses: actions/github-script@v7
        with:
          script: |
            const score = '${{ needs.generate-report.outputs.security_score }}';
            const critical = '${{ needs.generate-report.outputs.critical_count }}';
            const high = '${{ needs.generate-report.outputs.high_count }}';
            
            const body = `## 🚨 Security Alert - Vulnerabilities Detected
            
            ### 📊 Current Status
            
            | Metric | Value |
            |--------|-------|
            | Security Score | ${score}/10 |
            | Critical Issues | ${critical} |
            | High Issues | ${high} |
            
            ### 🔍 Details
            
            Automated security scanning has detected new vulnerabilities that require attention.
            
            ### ✅ Required Actions
            
            - [ ] Review security report in workflow artifacts
            - [ ] Run \`npm audit\` locally to see detailed information
            - [ ] Apply security patches: \`npm audit fix\`
            - [ ] For breaking changes, plan manual updates
            - [ ] Re-run security scan to verify fixes
            - [ ] Close this issue when resolved
            
            ### 🔗 References
            
            - [Latest Security Report](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
            - [Security Tab](${{ github.server_url }}/${{ github.repository }}/security)
            
            ---
            
            *This issue was automatically created by the Security Report workflow.*  
            *Generated: ${new Date().toISOString()}*
            `;
            
            const { data: issue } = await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `🔒 Security Alert - Vulnerabilities Detected (${new Date().toISOString().split('T')[0]})`,
              body: body,
              labels: ['security', 'automated', 'high-priority'],
              assignees: [] // Add default assignees if needed
            });
            
            console.log(`Created issue #${issue.number}`);
            core.setOutput('issue_number', issue.number);
            
      - name: 💬 Comment on Existing Issue
        if: steps.check_issue.outputs.has_existing == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const issueNumber = '${{ steps.check_issue.outputs.issue_number }}';
            
            const body = `## 📊 Updated Security Status - ${new Date().toISOString().split('T')[0]}
            
            | Metric | Value |
            |--------|-------|
            | Security Score | ${{ needs.generate-report.outputs.security_score }}/10 |
            | Critical | ${{ needs.generate-report.outputs.critical_count }} |
            | High | ${{ needs.generate-report.outputs.high_count }} |
            
            [View Full Report](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
            
            *This issue still requires attention.*`;
            
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              body: body
            });

  # ==========================================
  # Send Notifications
  # ==========================================
  notify:
    name: 📢 Notify
    runs-on: ubuntu-latest
    needs: generate-report
    if: always()
    timeout-minutes: 5
    
    steps:
      - name: 📊 Prepare Notification Data
        id: prepare
        run: |
          SCORE=${{ needs.generate-report.outputs.security_score }}
          THRESHOLD=${{ env.SECURITY_SCORE_THRESHOLD }}
          
          echo "score=$SCORE" >> $GITHUB_OUTPUT
          echo "critical=${{ needs.generate-report.outputs.critical_count }}" >> $GITHUB_OUTPUT
          echo "high=${{ needs.generate-report.outputs.high_count }}" >> $GITHUB_OUTPUT
          
          # Determine if we should send alert
          SHOULD_ALERT="false"
          
          if (( $(echo "$SCORE < $THRESHOLD" | bc -l) )); then
            SHOULD_ALERT="true"
            echo "alert_reason=Score below threshold ($SCORE < $THRESHOLD)" >> $GITHUB_OUTPUT
          fi
          
          if [ "${{ needs.generate-report.outputs.critical_count }}" -gt 0 ]; then
            SHOULD_ALERT="true"
            echo "alert_reason=Critical vulnerabilities detected" >> $GITHUB_OUTPUT
          fi
          
          echo "should_alert=$SHOULD_ALERT" >> $GITHUB_OUTPUT
          
      - name: 📢 Slack Alert (Score Below Threshold)
        if: |
          env.SLACK_WEBHOOK_URL != '' && 
          steps.prepare.outputs.should_alert == 'true'
        uses: 8398a7/action-slack@v3
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        with:
          status: ${{ needs.generate-report.result }}
          channel: '#security-alerts'
          text: |
            🚨 **Security Alert - Daily Report**
            
            ${{ steps.prepare.outputs.alert_reason }}
            
            📊 **Security Score:** ${{ steps.prepare.outputs.score }}/10 (Threshold: ${{ env.SECURITY_SCORE_THRESHOLD }})
            🔴 **Critical:** ${{ steps.prepare.outputs.critical }}
            🟠 **High:** ${{ steps.prepare.outputs.high }}
            
            📎 [View Full Report](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
            🔗 [Security Tab](${{ github.server_url }}/${{ github.repository }}/security)
            
      - name: 📢 Discord Alert (Score Below Threshold)
        if: |
          env.DISCORD_WEBHOOK_URL != '' && 
          steps.prepare.outputs.should_alert == 'true'
        uses: tsickert/discord-webhook@v5
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        with:
          webhook-url: ${{ secrets.DISCORD_WEBHOOK_URL }}
          username: "Security Bot"
          avatar-url: "https://github.githubassets.com/images/modules/logos_page/GitHub-Mark.png"
          content: |
            🚨 **Security Alert**
            
            **${{ steps.prepare.outputs.alert_reason }}**
            
            🔢 Security Score: **${{ steps.prepare.outputs.score }}**/10
            🔴 Critical: ${{ steps.prepare.outputs.critical }}
            🟠 High: ${{ steps.prepare.outputs.high }}
            
            [View Report](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
            
      - name: 📋 Daily Summary (All Runs)
        if: env.SLACK_WEBHOOK_URL != ''
        uses: 8398a7/action-slack@v3
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_DAILY }}
        with:
          status: ${{ needs.generate-report.result }}
          channel: '#security-reports'
          text: |
            📊 **Daily Security Report**
            
            Repository: `${{ github.repository }}`
            Score: **${{ steps.prepare.outputs.score }}**/10
            🔴 ${{ steps.prepare.outputs.critical }} | 🟠 ${{ steps.prepare.outputs.high }}
            
            [Details](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
