# 🔒 SILEXAR PULSE - SECURITY HARDENING PIPELINE
# Pipeline de seguridad continua con auto-remediación
# Version: 1.0.0 | Tier: TIER_0_PENTAGON++

name: 🔒 Security Hardening Continuous

on:
  push:
    branches: [main, develop, 'feature/**']
  pull_request:
    branches: [main, develop]
  schedule:
    # Ejecutar escaneo completo todos los días a las 2 AM UTC
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      scan_type:
        description: 'Tipo de escaneo'
        required: true
        default: 'full'
        type: choice
        options:
          - full
          - quick
          - dependencies
          - secrets

env:
  NODE_VERSION: '20'
  SECURITY_THRESHOLD: 8.0
  FAIL_ON_CRITICAL: true

jobs:
  # ═══════════════════════════════════════════════════════════════
  # JOB 1: SECRETS SCANNING
  # ═══════════════════════════════════════════════════════════════
  secrets-scan:
    name: 🔐 Secrets Detection
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect secrets
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          extra_args: --debug --only-verified

      - name: Run detect-secrets
        uses: reviewdog/action-detect-secrets@master
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          reporter: github-pr-review
          fail_on_error: true
          detect_secrets_flags: --all-files --force-use-all-plugins

      - name: Custom secrets validation
        run: |
          echo "🔍 Scanning for hardcoded secrets..."
          if grep -r "sk_live\|sk_test\|password.*=.*['\"]" --include="*.ts" --include="*.tsx" --include="*.js" src/ 2>/dev/null | grep -v "node_modules" | grep -v ".test." | head -20; then
            echo "❌ FAIL: Potential secrets found!"
            exit 1
          fi
          echo "✅ No hardcoded secrets detected"

  # ═══════════════════════════════════════════════════════════════
  # JOB 2: DEPENDENCY VULNERABILITY SCAN
  # ═══════════════════════════════════════════════════════════════
  dependency-scan:
    name: 📦 Dependency Audit
    runs-on: ubuntu-latest
    needs: secrets-scan
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Run npm audit
        run: |
          echo "🔍 Running npm security audit..."
          npm audit --audit-level=moderate --json > audit-report.json || true
          
          # Verificar vulnerabilidades críticas
          CRITICAL_COUNT=$(cat audit-report.json | jq '.metadata.vulnerabilities.critical // 0')
          HIGH_COUNT=$(cat audit-report.json | jq '.metadata.vulnerabilities.high // 0')
          
          echo "📊 Vulnerabilities found:"
          echo "   Critical: $CRITICAL_COUNT"
          echo "   High: $HIGH_COUNT"
          
          if [ "$CRITICAL_COUNT" -gt 0 ] && [ "${{ env.FAIL_ON_CRITICAL }}" = "true" ]; then
            echo "❌ FAIL: Critical vulnerabilities found!"
            npm audit --audit-level=critical
            exit 1
          fi
          
          if [ "$HIGH_COUNT" -gt 5 ]; then
            echo "⚠️ WARNING: More than 5 high vulnerabilities found"
          fi

      - name: Snyk Security Scan
        uses: snyk/actions/node@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high --json-file-output=snyk-report.json

      - name: Upload audit reports
        uses: actions/upload-artifact@v4
        with:
          name: security-audit-reports
          path: |
            audit-report.json
            snyk-report.json

  # ═══════════════════════════════════════════════════════════════
  # JOB 3: STATIC SECURITY ANALYSIS (SAST)
  # ═══════════════════════════════════════════════════════════════
  sast-analysis:
    name: 🔬 Static Analysis (SAST)
    runs-on: ubuntu-latest
    needs: secrets-scan
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Run ESLint Security
        run: |
          echo "🔍 Running ESLint with security rules..."
          npm run lint -- --ext .ts,.tsx --format json --output-file eslint-report.json || true

      - name: CodeQL Analysis
        uses: github/codeql-action/init@v3
        with:
          languages: javascript, typescript
          queries: security-extended,security-and-quality

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:javascript"

      - name: Run Semgrep
        uses: returntocorp/semgrep-action@v1
        with:
          config: >-
            p/security-audit
            p/owasp-top-ten
            p/cwe-top-25
            p/javascript
            p/typescript

  # ═══════════════════════════════════════════════════════════════
  # JOB 4: SECURITY TESTS
  # ═══════════════════════════════════════════════════════════════
  security-tests:
    name: 🧪 Security Tests
    runs-on: ubuntu-latest
    needs: [dependency-scan, sast-analysis]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Run security unit tests
        run: |
          echo "🧪 Running security-focused tests..."
          npm test -- --run tests/lib/security/security-tests.ts --reporter=verbose || true

      - name: Run authentication tests
        run: |
          echo "🔐 Running auth tests..."
          npm test -- --run tests/lib/auth/auth.test.ts --reporter=verbose || true

      - name: Generate coverage report
        run: |
          echo "📊 Generating security coverage report..."
          npm run test:coverage -- --run || true

  # ═══════════════════════════════════════════════════════════════
  # JOB 5: CONTAINER SECURITY (si aplica)
  # ═══════════════════════════════════════════════════════════════
  container-scan:
    name: 🐳 Container Security
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          if [ -f "Dockerfile" ]; then
            docker build -t silexar-pulse:security-scan .
          fi

      - name: Scan Docker image
        uses: aquasecurity/trivy-action@master
        if: hashFiles('Dockerfile') != ''
        with:
          image-ref: 'silexar-pulse:security-scan'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'

  # ═══════════════════════════════════════════════════════════════
  # JOB 6: SECURITY SCORE CALCULATION
  # ═══════════════════════════════════════════════════════════════
  security-score:
    name: 📊 Security Score
    runs-on: ubuntu-latest
    needs: [dependency-scan, sast-analysis, security-tests]
    outputs:
      score: ${{ steps.calculate.outputs.score }}
      status: ${{ steps.calculate.outputs.status }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Calculate security score
        id: calculate
        run: |
          echo "📊 Calculating security score..."
          
          # Base score
          SCORE=8.0
          
          # Verificar secrets (máxima prioridad)
          if grep -r "sk_live\|password.*=.*['\"]\|token.*=.*['\"]" --include="*.ts" src/ 2>/dev/null | grep -v "node_modules" | head -1; then
            SCORE=$(echo "$SCORE - 2.0" | bc)
            echo "❌ Secrets detected: -2.0"
          fi
          
          # Verificar fallbacks hardcodeados
          if grep -r "your-secret-key\|your-password\|123456" --include="*.ts" src/ 2>/dev/null | head -1; then
            SCORE=$(echo "$SCORE - 1.5" | bc)
            echo "❌ Hardcoded fallbacks: -1.5"
          fi
          
          # Asegurar que no baje de 0
          if (( $(echo "$SCORE < 0" | bc -l) )); then
            SCORE=0
          fi
          
          echo "score=$SCORE" >> $GITHUB_OUTPUT
          
          if (( $(echo "$SCORE >= ${{ env.SECURITY_THRESHOLD }}" | bc -l) )); then
            echo "status=PASS" >> $GITHUB_OUTPUT
            echo "✅ Security score: $SCORE/10 - PASS"
          else
            echo "status=FAIL" >> $GITHUB_OUTPUT
            echo "❌ Security score: $SCORE/10 - FAIL (threshold: ${{ env.SECURITY_THRESHOLD }})"
          fi

      - name: Comment PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const score = '${{ steps.calculate.outputs.score }}';
            const status = '${{ steps.calculate.outputs.status }}';
            const emoji = status === 'PASS' ? '✅' : '❌';
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `${emoji} **Security Score: ${score}/10**\n\nStatus: ${status}\n\nAll security checks completed. Review the detailed reports in the Actions tab.`
            });

  # ═══════════════════════════════════════════════════════════════
  # JOB 7: AUTO-REMEDIATION
  # ═══════════════════════════════════════════════════════════════
  auto-remediation:
    name: 🔧 Auto-Remediation
    runs-on: ubuntu-latest
    needs: [security-score]
    if: github.ref == 'refs/heads/main' && failure()
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Attempt auto-fix
        run: |
          echo "🔧 Attempting automatic fixes..."
          
          # Fix 1: Update vulnerable dependencies
          echo "📦 Updating dependencies..."
          npm audit fix --legacy-peer-deps || true
          
          # Fix 2: Run linter with fix
          echo "🔍 Running linter with auto-fix..."
          npm run lint -- --fix || true
          
          # Fix 3: Check if there are changes
          if [ -n "$(git status --porcelain)" ]; then
            echo "📝 Changes detected, creating PR..."
            git config user.name "Security Bot"
            git config user.email "security@silexar.com"
            git checkout -b security/auto-fix-$(date +%Y%m%d-%H%M%S)
            git add .
            git commit -m "🔒 Auto-remediation: Security fixes applied

- Updated vulnerable dependencies
- Applied linting fixes
- Auto-generated by Security Hardening Pipeline"
            git push origin HEAD
          else
            echo "✅ No automatic fixes needed"
          fi

  # ═══════════════════════════════════════════════════════════════
  # JOB 8: NOTIFICATIONS
  # ═══════════════════════════════════════════════════════════════
  notify:
    name: 📢 Notifications
    runs-on: ubuntu-latest
    needs: [security-score]
    if: always()
    steps:
      - name: Notify on failure
        if: needs.security-score.outputs.status == 'FAIL'
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ job.status }}
          text: |
            🚨 SECURITY ALERT: Silexar Pulse
            
            Security Score: ${{ needs.security-score.outputs.score }}/10
            Status: FAILED
            
            Immediate action required!
            Review: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_SECURITY_WEBHOOK }}

      - name: Update security dashboard
        if: github.ref == 'refs/heads/main'
        run: |
          echo "📊 Updating security dashboard..."
          echo "$(date -u +%Y-%m-%dT%H:%M:%SZ),${{ needs.security-score.outputs.score }},${{ github.sha }}" >> security-metrics.csv
