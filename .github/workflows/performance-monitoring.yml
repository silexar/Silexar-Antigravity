name: 📊 Performance Monitoring

on:
  schedule:
    # Run every 4 hours
    - cron: '0 */4 * * *'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to monitor'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - staging
      duration:
        description: 'Monitoring duration (minutes)'
        required: false
        default: '30'

env:
  NODE_VERSION: '20.x'

jobs:
  performance-monitoring:
    name: 📈 Performance Monitoring
    runs-on: ubuntu-latest
    timeout-minutes: 45
    concurrency:
      group: performance-${{ github.event.inputs.environment || 'scheduled' }}
      cancel-in-progress: true
    
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4
        
      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          
      - name: 📦 Install Dependencies
        run: npm ci --prefer-offline --no-audit
        
      - name: 🎯 Run Baseline Test
        env:
          TEST_URL: ${{ github.event.inputs.environment == 'production' && secrets.PROD_URL || secrets.STAGING_URL }}
        run: npm run test:baseline
        
      - name: 📊 Run Performance Test
        env:
          TEST_URL: ${{ github.event.inputs.environment == 'production' && secrets.PROD_URL || secrets.STAGING_URL }}
        run: npm run test:performance
        
      - name: 🔍 Run Monitoring Test
        env:
          TEST_URL: ${{ github.event.inputs.environment == 'production' && secrets.PROD_URL || secrets.STAGING_URL }}
          MONITORING_DURATION_MINUTES: ${{ github.event.inputs.duration || '30' }}
        run: |
          MINUTES=${MONITORING_DURATION_MINUTES:-30}
          MONITORING_DURATION=$((MINUTES*60*1000))
          export MONITORING_DURATION
          echo "Monitoring duration (ms): $MONITORING_DURATION"
          npm run test:monitoring
        
      - name: 📤 Upload Performance Reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: performance-reports-${{ github.event.inputs.environment || 'scheduled' }}
          path: |
            *-report-*.json
            performance-baseline.json
            
      - name: 📊 Performance Dashboard Update
        if: success()
        run: |
          # Update performance dashboard with latest metrics
          echo "Updating performance dashboard..."
          
      - name: 🚨 Alert on Performance Degradation
        if: failure()
        uses: 8398a7/action-slack@v3
        with:
          status: failure
          channel: '#alerts'
          text: |
            🚨 Performance degradation detected in ${{ github.event.inputs.environment || 'production' }}
            
            Repository: ${{ github.repository }}
            Environment: ${{ github.event.inputs.environment || 'production' }}
            Workflow: ${{ github.workflow }}
            
            Please check the performance reports for details.
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}