name: 🔒 Security Scan

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

env:
  NODE_VERSION: '20'

jobs:
  # ==========================================
  # NPM Security Audit
  # ==========================================
  npm-audit:
    name: 📦 NPM Audit
    runs-on: ubuntu-latest
    timeout-minutes: 15
    
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4
        
      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          
      - name: 📦 Install Dependencies
        run: npm ci --prefer-offline --no-audit
        
      - name: 🔍 NPM Security Audit
        id: npm_audit
        run: |
          echo "Running npm audit with moderate level..."
          npm audit --audit-level=moderate --json > npm-audit-report.json || EXIT_CODE=$?
          
          # Parse critical and high vulnerabilities
          CRITICAL_COUNT=$(cat npm-audit-report.json | jq -r '.metadata.vulnerabilities.critical // 0')
          HIGH_COUNT=$(cat npm-audit-report.json | jq -r '.metadata.vulnerabilities.high // 0')
          MODERATE_COUNT=$(cat npm-audit-report.json | jq -r '.metadata.vulnerabilities.moderate // 0')
          
          echo "critical_count=$CRITICAL_COUNT" >> $GITHUB_OUTPUT
          echo "high_count=$HIGH_COUNT" >> $GITHUB_OUTPUT
          echo "moderate_count=$MODERATE_COUNT" >> $GITHUB_OUTPUT
          
          echo "📊 Vulnerabilities Found:"
          echo "  Critical: $CRITICAL_COUNT"
          echo "  High: $HIGH_COUNT"
          echo "  Moderate: $MODERATE_COUNT"
          
          # Display audit results
          npm audit --audit-level=moderate || true
          
      - name: 📤 Upload NPM Audit Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: npm-audit-report
          path: npm-audit-report.json
          retention-days: 30
          
      - name: 🚫 Block PR on Critical Vulnerabilities
        if: github.event_name == 'pull_request' && steps.npm_audit.outputs.critical_count > 0
        run: |
          echo "❌ CRITICAL vulnerabilities found: ${{ steps.npm_audit.outputs.critical_count }}"
          echo "This PR cannot be merged until critical vulnerabilities are resolved."
          exit 1

  # ==========================================
  # Secret Scanning
  # ==========================================
  secret-scan:
    name: 🔑 Secret Scan
    runs-on: ubuntu-latest
    timeout-minutes: 15
    
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          
      - name: 🔍 Scan with TruffleHog
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          extra_args: --debug --only-verified
          
      - name: 🔍 Scan with GitLeaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ==========================================
  # Static Code Analysis (CodeQL)
  # ==========================================
  codeql-analysis:
    name: 🧪 CodeQL Analysis
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      actions: read
      contents: read
      security-events: write
    
    strategy:
      fail-fast: false
      matrix:
        language: ['javascript-typescript']
    
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4
        
      - name: 🧪 Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          queries: security-extended,security-and-quality
          
      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          
      - name: 📦 Install Dependencies
        run: npm ci --prefer-offline --no-audit
        
      - name: 🏗️ Build Application
        run: npm run build
        
      - name: 🔍 Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{matrix.language}}"

  # ==========================================
  # PR Comment with Results
  # ==========================================
  pr-comment:
    name: 💬 PR Comment
    runs-on: ubuntu-latest
    needs: [npm-audit, secret-scan, codeql-analysis]
    if: github.event_name == 'pull_request' && always()
    timeout-minutes: 5
    
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4
        
      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          
      - name: 📦 Install Dependencies
        run: npm ci --prefer-offline --no-audit
        
      - name: 🔍 Generate Audit Summary
        id: audit_summary
        run: |
          npm audit --audit-level=moderate --json > audit-summary.json || true
          
          # Calculate security score
          TOTAL_DEPS=$(cat audit-summary.json | jq -r '.metadata.totalDependencies // 0')
          CRITICAL=$(cat audit-summary.json | jq -r '.metadata.vulnerabilities.critical // 0')
          HIGH=$(cat audit-summary.json | jq -r '.metadata.vulnerabilities.high // 0')
          MODERATE=$(cat audit-summary.json | jq -r '.metadata.vulnerabilities.moderate // 0')
          LOW=$(cat audit-summary.json | jq -r '.metadata.vulnerabilities.low // 0')
          INFO=$(cat audit-summary.json | jq -r '.metadata.vulnerabilities.info // 0')
          
          # Calculate score (simple algorithm)
          if [ "$TOTAL_DEPS" -gt 0 ]; then
            SCORE=$(echo "scale=1; 10 - ($CRITICAL * 2 + $HIGH * 1 + $MODERATE * 0.5)" | bc)
            if (( $(echo "$SCORE < 0" | bc -l) )); then SCORE=0; fi
          else
            SCORE="N/A"
          fi
          
          echo "security_score=$SCORE" >> $GITHUB_OUTPUT
          echo "total_deps=$TOTAL_DEPS" >> $GITHUB_OUTPUT
          echo "critical=$CRITICAL" >> $GITHUB_OUTPUT
          echo "high=$HIGH" >> $GITHUB_OUTPUT
          echo "moderate=$MODERATE" >> $GITHUB_OUTPUT
          echo "low=$LOW" >> $GITHUB_OUTPUT
          echo "info=$INFO" >> $GITHUB_OUTPUT
        shell: bash
        
      - name: 💬 Comment PR with Security Results
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            
            const npmAuditResult = '${{ needs.npm-audit.result }}';
            const secretScanResult = '${{ needs.secret-scan.result }}';
            const codeqlResult = '${{ needs.codeql-analysis.result }}';
            
            const score = '${{ steps.audit_summary.outputs.security_score }}';
            const totalDeps = '${{ steps.audit_summary.outputs.total_deps }}';
            const critical = '${{ steps.audit_summary.outputs.critical }}';
            const high = '${{ steps.audit_summary.outputs.high }}';
            const moderate = '${{ steps.audit_summary.outputs.moderate }}';
            const low = '${{ steps.audit_summary.outputs.low }}';
            const info = '${{ steps.audit_summary.outputs.info }}';
            
            const getStatusEmoji = (result) => {
              if (result === 'success') return '✅';
              if (result === 'failure') return '❌';
              return '⚠️';
            };
            
            const getScoreColor = (s) => {
              if (s === 'N/A') return '⚪';
              const num = parseFloat(s);
              if (num >= 8) return '🟢';
              if (num >= 5) return '🟡';
              return '🔴';
            };
            
            const body = `## 🔒 Security Scan Results
            
            | Check | Status |
            |-------|--------|
            | ${getStatusEmoji(npmAuditResult)} NPM Audit | ${npmAuditResult.toUpperCase()} |
            | ${getStatusEmoji(secretScanResult)} Secret Scan | ${secretScanResult.toUpperCase()} |
            | ${getStatusEmoji(codeqlResult)} CodeQL Analysis | ${codeqlResult.toUpperCase()} |
            
            ### 📊 Security Score: ${getScoreColor(score)} ${score}/10
            
            ### 🔍 Vulnerability Summary
            | Severity | Count |
            |----------|-------|
            | 🔴 Critical | ${critical} |
            | 🟠 High | ${high} |
            | 🟡 Moderate | ${moderate} |
            | 🔵 Low | ${low} |
            | ⚪ Info | ${info} |
            
            **Total Dependencies:** ${totalDeps}
            
            ---
            *Scan completed at: ${new Date().toISOString()}*
            `;
            
            // Find existing comment
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number
            });
            
            const botComment = comments.find(comment => 
              comment.user.type === 'Bot' && 
              comment.body.includes('🔒 Security Scan Results')
            );
            
            if (botComment) {
              // Update existing comment
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: body
              });
            } else {
              // Create new comment
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: body
              });
            }

  # ==========================================
  # Block PR on Critical Failures
  # ==========================================
  security-gate:
    name: 🚫 Security Gate
    runs-on: ubuntu-latest
    needs: [npm-audit, secret-scan, codeql-analysis]
    if: github.event_name == 'pull_request' && always()
    timeout-minutes: 5
    
    steps:
      - name: 🚫 Check Security Gate
        run: |
          echo "Checking security scan results..."
          
          NPM_AUDIT="${{ needs.npm-audit.result }}"
          SECRET_SCAN="${{ needs.secret-scan.result }}"
          CODEQL="${{ needs.codeql-analysis.result }}"
          
          echo "NPM Audit: $NPM_AUDIT"
          echo "Secret Scan: $SECRET_SCAN"
          echo "CodeQL: $CODEQL"
          
          FAILED=0
          
          if [ "$NPM_AUDIT" == "failure" ]; then
            echo "❌ NPM Audit failed - Critical vulnerabilities detected"
            FAILED=1
          fi
          
          if [ "$SECRET_SCAN" == "failure" ]; then
            echo "❌ Secret Scan failed - Potential secrets detected"
            FAILED=1
          fi
          
          if [ "$CODEQL" == "failure" ]; then
            echo "❌ CodeQL Analysis failed - Security issues found"
            FAILED=1
          fi
          
          if [ $FAILED -eq 1 ]; then
            echo ""
            echo "🚫 SECURITY GATE FAILED"
            echo "This PR cannot be merged until all security checks pass."
            exit 1
          fi
          
          echo "✅ All security checks passed!"

  # ==========================================
  # Notification (Optional)
  # ==========================================
  notify:
    name: 📢 Notify
    runs-on: ubuntu-latest
    needs: [npm-audit, secret-scan, codeql-analysis]
    if: failure() && github.ref == 'refs/heads/main'
    timeout-minutes: 5
    
    steps:
      - name: 📢 Slack Notification
        if: env.SLACK_WEBHOOK_URL != ''
        uses: 8398a7/action-slack@v3
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        with:
          status: ${{ job.status }}
          channel: '#security-alerts'
          text: |
            🚨 Security Scan Failed in `${{ github.repository }}`
            
            • Branch: `${{ github.ref_name }}`
            • Commit: `${{ github.sha }}`
            • Author: ${{ github.actor }}
            
            Check details: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
            
      - name: 📢 Discord Notification
        if: env.DISCORD_WEBHOOK_URL != ''
        uses: tsickert/discord-webhook@v5
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        with:
          webhook-url: ${{ secrets.DISCORD_WEBHOOK_URL }}
          username: "Security Bot"
          avatar-url: "https://github.githubassets.com/images/modules/logos_page/GitHub-Mark.png"
          content: |
            🚨 **Security Scan Failed**
            
            Repository: `${{ github.repository }}`
            Branch: `${{ github.ref_name }}`
            Commit: `${{ github.sha }}`
            Author: ${{ github.actor }}
            
            [View Run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
