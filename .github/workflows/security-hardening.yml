name: 🔒 Security Hardening

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

env:
  NODE_VERSION: '20'

jobs:
  secrets-scan:
    name: 🔐 Secrets Detection
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Basic secret patterns check
        run: |
          echo "🔍 Scanning for obvious hardcoded secrets in source..."
          if grep -rEn "sk_live_[a-zA-Z0-9]{20,}|password\s*=\s*['\"][^'\"]{8,}['\"]|token\s*=\s*['\"][a-zA-Z0-9_-]{20,}['\"]" \
            --include="*.ts" --include="*.tsx" --include="*.js" --exclude-dir="node_modules" --exclude-dir=".next" --exclude="*.test.*" --exclude="*.spec.*" \
            src/ 2>/dev/null | grep -v "EXAMPLE\|example\|test\|mock\|placeholder\|process.env"; then
            echo "::warning::Potential secrets detected — manual review recommended"
          else
            echo "✅ No obvious hardcoded secrets in source"
          fi

  dependency-scan:
    name: 📦 Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit
      - name: Run npm audit
        run: |
          npm audit --audit-level=moderate --json > audit-report.json || true
          CRITICAL_COUNT=$(cat audit-report.json | jq '.metadata.vulnerabilities.critical // 0')
          HIGH_COUNT=$(cat audit-report.json | jq '.metadata.vulnerabilities.high // 0')
          echo "Critical: $CRITICAL_COUNT | High: $HIGH_COUNT"
          if [ "$CRITICAL_COUNT" -gt 0 ]; then
            npm audit --audit-level=critical
            exit 1
          fi
      - name: Upload audit reports
        uses: actions/upload-artifact@v4
        with:
          name: security-audit-reports
          path: audit-report.json

  sast-analysis:
    name: 🔬 Static Analysis (SAST)
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit
      - name: Run ESLint
        run: npm run lint || true
      - name: CodeQL Analysis
        uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript
          queries: security-extended,security-and-quality
      - name: Autobuild
        uses: github/codeql-action/autobuild@v3
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:javascript-typescript"

  security-tests:
    name: 🧪 Security Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit
      - name: Run security unit tests
        run: npm run test -- --run src/lib/security/ || true
      - name: Run authentication tests
        run: npm run test -- --run src/__tests__/auth/ tests/lib/auth/ || true
