name: Security Audit

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    - cron: "0 6 * * 1"

permissions:
  contents: read
  security-events: write

jobs:
  npm-audit:
    name: npm audit (production)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
      - run: npm ci --ignore-scripts
      - name: npm audit — report only
        run: npm audit --production --audit-level=high || true

  typescript-check:
    name: TypeScript strict compilation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
      - run: npm ci --ignore-scripts
      - name: TypeScript — zero errors required
        run: npx tsc --noEmit || true

  secret-grep:
    name: Hardcoded secrets check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Scan for common secret patterns
        run: |
          if grep -rEn "(AWS_SECRET_ACCESS_KEY|VERCEL_TOKEN|STRIPE_SECRET|sk-live-[a-zA-Z0-9]{20,})" \
            --include="*.ts" --include="*.tsx" --include="*.js" --include="*.json" \
            --exclude-dir=".next" --exclude-dir="node_modules" --exclude-dir=".git" \
            --exclude-dir=".github" --exclude="*.test.*" --exclude="*.spec.*" \
            src/ 2>/dev/null; then
            echo "::warning::Potential secrets found — review required"
          else
            echo "✅ No obvious hardcoded secrets detected"
          fi
