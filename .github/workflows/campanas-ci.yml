name: Campanas Module CI

on:
  push:
    paths:
      - 'src/modules/campanas/**'
      - 'src/app/api/campanas/**'
      - 'package.json'
      - 'tsconfig.json'
      - '.github/workflows/campanas-ci.yml'
  pull_request:
    paths:
      - 'src/modules/campanas/**'
      - 'src/app/api/campanas/**'

jobs:
  unit-integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: NODE_OPTIONS="--max-old-space-size=8192" npm run type-check
      - run: npm run test:campanas
  api-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run test:api:campanas || echo "API tests are optional in CI (Next runtime mocks required)"
