name: 🔒 Scheduled Security Audit

on:
  schedule:
    - cron: '0 9 * * 1'
  workflow_dispatch:

env:
  NODE_VERSION: '20'

jobs:
  weekly-report:
    name: 📊 Weekly Security Report
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit

      - name: Run NPM Audit
        id: audit
        run: |
          npm audit --json > security-report.json || true
          CRITICAL=$(cat security-report.json | jq -r '.metadata.vulnerabilities.critical // 0')
          HIGH=$(cat security-report.json | jq -r '.metadata.vulnerabilities.high // 0')
          MODERATE=$(cat security-report.json | jq -r '.metadata.vulnerabilities.moderate // 0')
          LOW=$(cat security-report.json | jq -r '.metadata.vulnerabilities.low // 0')
          echo "critical=$CRITICAL" >> $GITHUB_OUTPUT
          echo "high=$HIGH" >> $GITHUB_OUTPUT
          echo "moderate=$MODERATE" >> $GITHUB_OUTPUT
          echo "low=$LOW" >> $GITHUB_OUTPUT
          echo "Report: Critical=$CRITICAL High=$HIGH Moderate=$MODERATE Low=$LOW"

      - name: Upload Report
        uses: actions/upload-artifact@v4
        with:
          name: security-report-weekly
          path: security-report.json
          retention-days: 90

      - name: Create Issue if Critical Found
        if: steps.audit.outputs.critical > 0
        uses: actions/github-script@v7
        with:
          script: |
            const critical = '${{ steps.audit.outputs.critical }}';
            const high = '${{ steps.audit.outputs.high }}';
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `🚨 Security Alert - ${critical} Critical Vulnerabilities Detected`,
              body: `Weekly audit found **${critical}** critical and **${high}** high severity vulnerabilities.\\n\\n[View Report](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})`,
              labels: ['security', 'automated']
            });
