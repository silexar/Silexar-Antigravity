name: 🔄 Dependency Update

on:
  schedule:
    # Run every Monday at 9:00 AM UTC
    - cron: '0 9 * * 1'
  workflow_dispatch:

env:
  NODE_VERSION: '20'

jobs:
  # ==========================================
  # Check and Update Dependencies
  # ==========================================
  update-dependencies:
    name: 📦 Update Dependencies
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: write
      pull-requests: write
    
    outputs:
      has_updates: ${{ steps.check_updates.outputs.has_updates }}
      update_branch: ${{ steps.check_updates.outputs.update_branch }}
    
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          
      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          
      - name: 📦 Install Dependencies
        run: npm ci --prefer-offline --no-audit
        
      - name: 📋 Create Update Branch
        id: check_updates
        run: |
          # Generate branch name with timestamp
          BRANCH_NAME="deps/update-$(date +%Y%m%d-%H%M%S)"
          echo "update_branch=$BRANCH_NAME" >> $GITHUB_OUTPUT
          
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          git checkout -b "$BRANCH_NAME"
          
      - name: 🔍 Check for Security Vulnerabilities
        id: security_check
        run: |
          # Run npm audit to check current state
          npm audit --audit-level=moderate --json > before-audit.json || true
          
          CRITICAL_BEFORE=$(cat before-audit.json | jq -r '.metadata.vulnerabilities.critical // 0')
          HIGH_BEFORE=$(cat before-audit.json | jq -r '.metadata.vulnerabilities.high // 0')
          
          echo "critical_before=$CRITICAL_BEFORE" >> $GITHUB_OUTPUT
          echo "high_before=$HIGH_BEFORE" >> $GITHUB_OUTPUT
          
          echo "📊 Vulnerabilities BEFORE fix:"
          echo "  Critical: $CRITICAL_BEFORE"
          echo "  High: $HIGH_BEFORE"
          
      - name: 🔧 Run NPM Audit Fix
        id: audit_fix
        run: |
          echo "Running npm audit fix --force..."
          
          # Capture output of audit fix
          npm audit fix --force 2>&1 | tee audit-fix-output.log || EXIT_CODE=$?
          
          # Check if package.json or package-lock.json changed
          if git diff --name-only | grep -E "(package\.json|package-lock\.json)" > /dev/null; then
            echo "has_updates=true" >> $GITHUB_OUTPUT
            echo "✅ Dependencies were updated"
          else
            echo "has_updates=false" >> $GITHUB_OUTPUT
            echo "ℹ️ No dependency updates needed"
          fi
          
      - name: 🆙 Check for Available Updates (npm-check-updates)
        id: ncu_check
        run: |
          # Install npm-check-updates
          npm install -g npm-check-updates
          
          # Check for updates (non-interactive)
          echo "Checking for available updates..."
          ncu --json > ncu-report.json || true
          
          # Count available updates
          UPDATE_COUNT=$(cat ncu-report.json | jq 'length')
          echo "available_updates=$UPDATE_COUNT" >> $GITHUB_OUTPUT
          
          if [ "$UPDATE_COUNT" -gt 0 ]; then
            echo "📦 $UPDATE_COUNT packages have updates available"
            cat ncu-report.json | jq -r 'to_entries[] | "  - \(.key): \(..value.current) → \(.value.latest)"'
          fi
          
      - name: 🧪 Run Tests
        id: run_tests
        if: steps.audit_fix.outputs.has_updates == 'true'
        run: |
          echo "Running test suite to verify updates don't break anything..."
          
          # Run linting
          echo "📋 Running ESLint..."
          npm run lint || LINT_FAILED=1
          
          # Run TypeScript check
          echo "📘 Running TypeScript check..."
          npm run check || TSC_FAILED=1
          
          # Run unit tests
          echo "🧪 Running unit tests..."
          npm run test -- --run || TEST_FAILED=1
          
          # Summary
          if [ -n "$LINT_FAILED" ] || [ -n "$TSC_FAILED" ] || [ -n "$TEST_FAILED" ]; then
            echo "⚠️ Some tests failed after update"
            echo "lint_failed=${LINT_FAILED:-0}" >> $GITHUB_OUTPUT
            echo "tsc_failed=${TSC_FAILED:-0}" >> $GITHUB_OUTPUT
            echo "test_failed=${TEST_FAILED:-0}" >> $GITHUB_OUTPUT
            exit 1
          fi
          
          echo "✅ All tests passed!"
          
      - name: 📊 Verify Security After Fix
        id: verify_security
        if: steps.audit_fix.outputs.has_updates == 'true'
        run: |
          npm audit --audit-level=moderate --json > after-audit.json || true
          
          CRITICAL_AFTER=$(cat after-audit.json | jq -r '.metadata.vulnerabilities.critical // 0')
          HIGH_AFTER=$(cat after-audit.json | jq -r '.metadata.vulnerabilities.high // 0')
          
          echo "📊 Vulnerabilities AFTER fix:"
          echo "  Critical: $CRITICAL_AFTER"
          echo "  High: $HIGH_AFTER"
          
          echo "critical_after=$CRITICAL_AFTER" >> $GITHUB_OUTPUT
          echo "high_after=$HIGH_AFTER" >> $GITHUB_OUTPUT
          
      - name: 📄 Generate Update Report
        id: generate_report
        if: steps.audit_fix.outputs.has_updates == 'true'
        run: |
          cat > DEPENDENCY_UPDATE_REPORT.md << 'EOF'
          # 📦 Dependency Update Report
          
          **Generated:** $(date -u +"%Y-%m-%d %H:%M:%S UTC")
          **Workflow Run:** ${{ github.run_id }}
          
          ## 🔍 Security Changes
          
          | Severity | Before | After |
          |----------|--------|-------|
          | Critical | ${{ steps.security_check.outputs.critical_before }} | ${{ steps.verify_security.outputs.critical_after }} |
          | High | ${{ steps.security_check.outputs.high_before }} | ${{ steps.verify_security.outputs.high_after }} |
          
          ## 📋 Available Updates
          
          ${{ steps.ncu_check.outputs.available_updates }} packages have newer versions available.
          
          See 
cu-report.json for details.
          
          ## ✅ Test Results
          
          | Check | Status |
          |-------|--------|
          | ESLint | ${{ steps.run_tests.outputs.lint_failed == '1' && '❌ Failed' || '✅ Passed' }} |
          | TypeScript | ${{ steps.run_tests.outputs.tsc_failed == '1' && '❌ Failed' || '✅ Passed' }} |
          | Unit Tests | ${{ steps.run_tests.outputs.test_failed == '1' && '❌ Failed' || '✅ Passed' }} |
          
          ## 📝 Notes
          
          - This PR was automatically generated by the Dependency Update workflow
          - Manual review recommended before merging
          - Run additional E2E tests if critical dependencies were updated
          
          EOF
          
          cat DEPENDENCY_UPDATE_REPORT.md
          
      - name: 💾 Commit Changes
        id: commit_changes
        if: steps.audit_fix.outputs.has_updates == 'true'
        run: |
          git add package.json package-lock.json
          
          if [ -f DEPENDENCY_UPDATE_REPORT.md ]; then
            git add DEPENDENCY_UPDATE_REPORT.md
          fi
          
          if [ -f ncu-report.json ]; then
            git add ncu-report.json
          fi
          
          git commit -m "chore(deps): security update - $(date +%Y-%m-%d)
          
          - Automated npm audit fix
          - Critical vulnerabilities: ${{ steps.security_check.outputs.critical_before }} → ${{ steps.verify_security.outputs.critical_after }}
          - High vulnerabilities: ${{ steps.security_check.outputs.high_before }} → ${{ steps.verify_security.outputs.high_after }}
          
          [skip ci]"
          
          git push origin ${{ steps.check_updates.outputs.update_branch }}
          
          echo "changes_committed=true" >> $GITHUB_OUTPUT
          
      - name: 📤 Upload Reports
        if: always() && (steps.audit_fix.outputs.has_updates == 'true' || steps.ncu_check.outputs.available_updates > 0)
        uses: actions/upload-artifact@v4
        with:
          name: dependency-reports
          path: |
            before-audit.json
            after-audit.json
            ncu-report.json
            audit-fix-output.log
            DEPENDENCY_UPDATE_REPORT.md
          retention-days: 30

  # ==========================================
  # Create Pull Request
  # ==========================================
  create-pr:
    name: 📝 Create Pull Request
    runs-on: ubuntu-latest
    needs: update-dependencies
    if: needs.update-dependencies.outputs.has_updates == 'true'
    timeout-minutes: 10
    permissions:
      contents: write
      pull-requests: write
    
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          
      - name: 📝 Create Pull Request
        id: create_pr
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: ${{ needs.update-dependencies.outputs.update_branch }}
          base: main
          title: "🔄 chore(deps): Weekly Security Dependency Update"
          body: |
            ## 📦 Automated Dependency Update
            
            This PR was automatically generated by the Dependency Update workflow.
            
            ### 🔒 Security Improvements
            
            This update addresses security vulnerabilities found in dependencies.
            
            ### ✅ Checklist
            
            - [ ] Review updated dependencies
            - [ ] Verify no breaking changes
            - [ ] Run E2E tests if needed
            - [ ] Check CHANGELOGs of major updates
            - [ ] Approve and merge if all checks pass
            
            ### 📋 Related
            
            - Workflow: `.github/workflows/dependency-update.yml`
            - Generated: $(date -u +"%Y-%m-%d %H:%M:%S UTC")
          labels: |
            dependencies
            security
            automated
          draft: false
          
      - name: 📢 Comment on PR
        if: steps.create_pr.outputs.pull-request-number
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = ${{ steps.create_pr.outputs.pull-request-number }};
            
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body: `## 🤖 Automated Dependency Update
              
              ### Next Steps:
              
              1. **Review Changes**: Check package.json and package-lock.json changes
              2. **Run Tests**: Ensure CI checks pass
              3. **Manual Testing**: Test critical user flows if major dependencies updated
              4. **Merge**: If all checks pass, merge to apply security fixes
              
              ---
              *This PR will be auto-closed if a newer dependency update is generated.*`
            });

  # ==========================================
  # Notify Results
  # ==========================================
  notify:
    name: 📢 Notify
    runs-on: ubuntu-latest
    needs: [update-dependencies, create-pr]
    if: always()
    timeout-minutes: 5
    
    steps:
      - name: 📊 Prepare Notification Message
        id: prepare_msg
        run: |
          if [ "${{ needs.update-dependencies.result }}" == "success" ] && [ "${{ needs.update-dependencies.outputs.has_updates }}" == "true" ]; then
            echo "status=success" >> $GITHUB_OUTPUT
            echo "message=✅ Dependency update PR created successfully" >> $GITHUB_OUTPUT
          elif [ "${{ needs.update-dependencies.result }}" == "success" ] && [ "${{ needs.update-dependencies.outputs.has_updates }}" == "false" ]; then
            echo "status=no-updates" >> $GITHUB_OUTPUT
            echo "message=ℹ️ No dependency updates required" >> $GITHUB_OUTPUT
          else
            echo "status=failure" >> $GITHUB_OUTPUT
            echo "message=❌ Dependency update workflow failed" >> $GITHUB_OUTPUT
          fi
          
      - name: 📢 Slack Notification
        if: env.SLACK_WEBHOOK_URL != ''
        uses: 8398a7/action-slack@v3
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        with:
          status: ${{ needs.update-dependencies.result }}
          channel: '#dependencies'
          text: |
            ${{ steps.prepare_msg.outputs.message }}
            
            Repository: `${{ github.repository }}`
            Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
            
      - name: 📢 Discord Notification
        if: env.DISCORD_WEBHOOK_URL != ''
        uses: tsickert/discord-webhook@v5
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        with:
          webhook-url: ${{ secrets.DISCORD_WEBHOOK_URL }}
          username: "Dependency Bot"
          avatar-url: "https://github.githubassets.com/images/modules/logos_page/GitHub-Mark.png"
          content: |
            ${{ steps.prepare_msg.outputs.message }}
            
            [View Details](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
