# @fileoverview Enterprise CI/CD Pipeline for Fortune 500 Standards
# 
# Comprehensive GitHub Actions workflow with security scanning, testing,
# performance monitoring, and automated deployment following enterprise standards.
# 
# @author SILEXAR AI Team
# @version 2040.1.0
# @deployment Fortune 500 CI/CD pipeline with security gates
# @compliance SOC 2 Type II, GDPR, PCI DSS deployment standards

name: 🚀 Silexar Pulse Quantum - Enterprise CI/CD

on:
  push:
    branches: [ main, develop, release/* ]
  pull_request:
    branches: [ main, develop ]
  schedule:
    # Daily security scan at 2 AM UTC
    - cron: '0 2 * * *'

permissions:
  contents: read
  packages: write
  security-events: write
  id-token: write

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20.x'
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  SONAR_PROJECT_KEY: silexar-pulse-quantum
  
jobs:
  # 🔍 Security & Compliance Scanning
  security-scan:
    name: 🛡️ Security & Compliance Scan
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      security-events: write
      contents: read
    
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Full history for security analysis
          
      - name: 🔐 Run Trivy Security Scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH,MEDIUM'
          
      - name: 📊 Upload Trivy Results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'
          
      - name: 🔍 CodeQL Security Analysis
        uses: github/codeql-action/init@v3
        with:
          languages: javascript,typescript
          queries: security-extended,security-and-quality
          
      - name: 🏗️ Autobuild for CodeQL
        uses: github/codeql-action/autobuild@v3
        
      - name: 📈 Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:javascript"
          
      - name: 🔐 OWASP Dependency Check
        uses: dependency-check/Dependency-Check_Action@main
        with:
          project: 'Silexar Pulse Quantum'
          path: '.'
          format: 'ALL'
          args: >
            --enableRetired
            --enableExperimental
            --failOnCVSS 7
            
      - name: 📤 Upload OWASP Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: owasp-dependency-check-reports
          path: reports/

  # 🧪 Testing & Quality Assurance
  test-and-quality:
    name: 🧪 Testing & Quality Assurance
    runs-on: ubuntu-latest
    timeout-minutes: 90
    needs: security-scan
    
    strategy:
      matrix:
        node-version: [18.x, 20.x, 21.x]
        
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          
      - name: 🟢 Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
          
      - name: 📦 Install Dependencies
        run: |
          npm ci --prefer-offline --no-audit
          npm ls --depth=0
          
      - name: 🔍 Lint & Code Quality
        run: |
          npm run lint
          npm run check
          
      - name: 🧪 Run Unit Tests
        run: |
          npm run test -- --run --coverage
          
      - name: 📊 Upload Coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          file: ./coverage/lcov.info
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: true
          
      - name: 🎭 Run E2E Tests
        run: |
          npm run build
          npm run test:e2e
          
      - name: 📈 SonarCloud Analysis
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.projectKey=${{ env.SONAR_PROJECT_KEY }}
            -Dsonar.organization=silexar
            -Dsonar.javascript.lcov.reportPaths=coverage/lcov.info
            -Dsonar.coverage.exclusions=**/*.test.ts,**/*.spec.ts,**/node_modules/**
            -Dsonar.qualitygate.wait=true
            
      - name: 📊 Performance Audit
        run: |
          npm run build
          npx lighthouse-ci autorun --config=.lighthouserc.json || true
          
      - name: 📤 Upload Test Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-${{ matrix.node-version }}
          path: |
            coverage/
            test-results/
            lighthouse-results/

  # 🏗️ Build & Package
  build-and-package:
    name: 🏗️ Build & Package
    runs-on: ubuntu-latest
    timeout-minutes: 60
    needs: [security-scan, test-and-quality]
    continue-on-error: true
    
    outputs:
      image-digest: ${{ steps.build.outputs.digest }}
      image-tag: ${{ steps.meta.outputs.tags }}
    
    permissions:
      contents: read
      packages: write
      id-token: write
      
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4
        
      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          
      - name: 📦 Install Dependencies
        run: npm ci --prefer-offline --no-audit
        
      - name: 🏗️ Build Application
        run: |
          npm run build
          
      - name: 🧰 Set up QEMU
        uses: docker/setup-qemu-action@v3
        
      - name: 🐳 Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        
      - name: 🔐 Login to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
          
      - name: 🏷️ Extract Metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,format=short
            type=raw,value=latest,enable={{is_default_branch}}
            
      - name: 🏗️ Build and Push Docker Image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.production
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64
          
      - name: 🔐 Sign Container Image
        uses: sigstore/cosign-installer@v3
        
      - name: ✍️ Sign the Published Docker Image
        env:
          COSIGN_EXPERIMENTAL: 'true'
        run: |
          cosign sign --yes ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.build.outputs.digest }}

  # 🚀 Deploy to Staging
  deploy-staging:
    name: 🚀 Deploy to Staging
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs: build-and-package
    if: false # Temporarily disabled until AWS credentials are configured
    environment: staging
    
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4
        
      - name: ⚙️ Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1
          
      - name: 🚀 Deploy to ECS Staging
        run: |
          aws ecs update-service \
            --cluster silexar-staging \
            --service silexar-pulse-staging \
            --force-new-deployment
            
      - name: ⏳ Wait for Deployment
        run: |
          aws ecs wait services-stable \
            --cluster silexar-staging \
            --services silexar-pulse-staging
            
      - name: 🧪 Run Smoke Tests
        run: |
          npm run test:smoke -- --env=staging
          
      - name: 📊 Performance Testing
        run: |
          npm run test:performance -- --env=staging

  # 🚀 Deploy to Production
  deploy-production:
    name: 🚀 Deploy to Production
    runs-on: ubuntu-latest
    timeout-minutes: 60
    needs: [build-and-package]
    if: false # Temporarily disabled until AWS credentials are configured
    environment: production
    
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4
        
      - name: ⚙️ Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID_PROD }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY_PROD }}
          aws-region: us-east-1
          
      - name: 🔄 Blue-Green Deployment
        run: |
          # Deploy to green environment
          aws ecs update-service \
            --cluster silexar-production \
            --service silexar-pulse-green \
            --force-new-deployment
            
          # Wait for green deployment
          aws ecs wait services-stable \
            --cluster silexar-production \
            --services silexar-pulse-green
            
      - name: 🧪 Production Health Checks
        run: |
          npm run test:health -- --env=production-green
          npm run test:smoke -- --env=production-green
          
      - name: 🔄 Switch Traffic to Green
        run: |
          # Update load balancer to point to green
          aws elbv2 modify-target-group \
            --target-group-arn ${{ secrets.PROD_TARGET_GROUP_ARN }} \
            --health-check-path /api/health
            
      - name: 📊 Post-Deployment Monitoring
        run: |
          # Monitor for 5 minutes
          sleep 300
          npm run test:monitoring -- --env=production --duration=5m
          
      - name: 🔄 Complete Blue-Green Switch
        run: |
          # Scale down blue environment
          aws ecs update-service \
            --cluster silexar-production \
            --service silexar-pulse-blue \
            --desired-count 0

  # 📊 Post-Deployment Monitoring
  post-deployment-monitoring:
    name: 📊 Post-Deployment Monitoring
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: deploy-production
    if: always() && github.ref == 'refs/heads/main' && needs.deploy-production.result == 'success'

    steps:
      - name: 📊 Setup Monitoring
        run: |
          # Setup CloudWatch alarms
          aws cloudwatch put-metric-alarm \
            --alarm-name "SilexarPulse-HighErrorRate" \
            --alarm-description "High error rate detected" \
            --metric-name ErrorRate \
            --namespace AWS/ApplicationELB \
            --statistic Average \
            --period 300 \
            --threshold 5.0 \
            --comparison-operator GreaterThanThreshold \
            --evaluation-periods 2
            
      - name: 📈 Performance Baseline
        run: |
          # Establish performance baseline
          npm run test:baseline -- --env=production
          
      - name: 🔔 Setup Alerts
        run: |
          # Configure Slack/Teams notifications
          curl -X POST ${{ secrets.SLACK_WEBHOOK_URL }} \
            -H 'Content-type: application/json' \
            --data '{"text":"🚀 Silexar Pulse Quantum deployed to production successfully!"}'

  # 🧹 Cleanup
  cleanup:
    name: 🧹 Cleanup
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [deploy-production, post-deployment-monitoring]
    if: always() && (needs.deploy-production.result == 'success' || needs.deploy-production.result == 'skipped')

    permissions:
      contents: read
      packages: write
    
    steps:
      - name: 🧹 Clean up old images
        run: |
          # Keep only last 10 images
          gh api repos/${{ github.repository }}/packages/container/silexar-pulse-quantum/versions \
            --jq '.[10:] | .[] | .id' | \
            xargs -I {} gh api --method DELETE repos/${{ github.repository }}/packages/container/silexar-pulse-quantum/versions/{}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          
      - name: 📊 Generate Deployment Report
        run: |
          echo "## 🚀 Deployment Report" >> $GITHUB_STEP_SUMMARY
          echo "- **Status**: ✅ Success" >> $GITHUB_STEP_SUMMARY
          echo "- **Environment**: Production" >> $GITHUB_STEP_SUMMARY
          echo "- **Image**: ${{ needs.build-and-package.outputs.image-tag }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Digest**: ${{ needs.build-and-package.outputs.image-digest }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Deployed at**: $(date -u)" >> $GITHUB_STEP_SUMMARY