name: Silexar Pulse CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ── Quality: lint, type check, unit tests, build ─────────────────────────
  quality:
    name: Quality Gates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      - name: Unit tests (with coverage)
        run: npm run test -- --run --coverage
        env:
          DATABASE_URL: ""
          JWT_SECRET: "ci-test-secret-must-be-at-least-32-characters-long"
          NEXTAUTH_SECRET: "ci-test-secret-must-be-at-least-32-characters-long"

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

      - name: Build
        run: npm run build
        env:
          DATABASE_URL: ""
          JWT_SECRET: "ci-test-secret-must-be-at-least-32-characters-long"
          NEXTAUTH_SECRET: "ci-test-secret-must-be-at-least-32-characters-long"

  # ── E2E tests ────────────────────────────────────────────────────────────
  e2e:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest
    needs: quality
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Start dev server
        run: npm run dev &
        env:
          DATABASE_URL: ""
          JWT_SECRET: "ci-test-secret-must-be-at-least-32-characters-long"
          NEXTAUTH_SECRET: "ci-test-secret-must-be-at-least-32-characters-long"
          PORT: 3000

      - name: Wait for server to be ready
        run: |
          echo "Waiting for server..."
          for i in $(seq 1 30); do
            curl -sf http://localhost:3000 >/dev/null 2>&1 && echo "Server ready" && break
            sleep 2
          done

      - name: Run E2E tests
        run: npx playwright test tests/e2e/auth.spec.ts
        env:
          BASE_URL: http://localhost:3000
          CI: true

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            test-results/
            playwright-report/
          retention-days: 7
