name: Silexar Pulse CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ── Quality: lint, type check, unit tests, build ─────────────────────────
  quality:
    name: Quality Gates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Security Autofix Check
        run: npm run security:autofix:check
        continue-on-error: true # Warning only, don't block CI

      - name: Lint
        run: npm run lint

      - name: Unit tests (with coverage)
        run: npm run test -- --run --coverage
        env:
          DATABASE_URL: ""
          JWT_SECRET: "ci-test-secret-must-be-at-least-32-characters-long"
          NEXTAUTH_SECRET: "ci-test-secret-must-be-at-least-32-characters-long"

      - name: Check coverage thresholds (80%)
        run: |
          echo "Verificando thresholds de cobertura..."
          if [ -f coverage/coverage-summary.json ]; then
            LINES=$(cat coverage/coverage-summary.json | jq -r '.total.lines.pct // 0')
            FUNCTIONS=$(cat coverage/coverage-summary.json | jq -r '.total.functions.pct // 0')
            BRANCHES=$(cat coverage/coverage-summary.json | jq -r '.total.branches.pct // 0')
            STATEMENTS=$(cat coverage/coverage-summary.json | jq -r '.total.statements.pct // 0')
            
            echo "Cobertura actual: Lines=${LINES}%, Functions=${FUNCTIONS}%, Branches=${BRANCHES}%, Statements=${STATEMENTS}%"
            
            # Verificar threshold de 80%
            if (( $(echo "$LINES < 80" | bc -l) )); then
              echo "❌ Coverage de líneas ($LINES%) está por debajo del threshold (80%)"
              exit 1
            fi
            if (( $(echo "$FUNCTIONS < 80" | bc -l) )); then
              echo "❌ Coverage de funciones ($FUNCTIONS%) está por debajo del threshold (80%)"
              exit 1
            fi
            echo "✅ Todos los thresholds de cobertura cumplidos"
          else
            echo "⚠️  No se encontró coverage/coverage-summary.json"
          fi
        shell: bash

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

      - name: Build
        run: npm run build
        env:
          DATABASE_URL: ""
          JWT_SECRET: "ci-test-secret-must-be-at-least-32-characters-long"
          NEXTAUTH_SECRET: "ci-test-secret-must-be-at-least-32-characters-long"

  # ── E2E Tests ────────────────────────────────────────────────────────────
  e2e:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest
    needs: quality
    timeout-minutes: 30
    strategy:
      matrix:
        test-suite: [auth, cunas, contratos, navigation]
      fail-fast: false
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Start dev server
        run: npm run dev &
        env:
          DATABASE_URL: ""
          JWT_SECRET: "ci-test-secret-must-be-at-least-32-characters-long"
          NEXTAUTH_SECRET: "ci-test-secret-must-be-at-least-32-characters-long"
          PORT: 3000

      - name: Wait for server to be ready
        run: |
          echo "Waiting for server..."
          for i in $(seq 1 60); do
            curl -sf http://localhost:3000 >/dev/null 2>&1 && echo "Server ready" && break
            sleep 2
          done

      - name: Run E2E Tests - ${{ matrix.test-suite }}
        run: npx playwright test tests/e2e/${{ matrix.test-suite }} --project=chromium-desktop
        env:
          BASE_URL: http://localhost:3000
          CI: true

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ matrix.test-suite }}
          path: |
            test-results/
            playwright-report/
          retention-days: 7

  # ── Lighthouse CI ────────────────────────────────────────────────────────
  lighthouse:
    name: Lighthouse CI
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build production
        run: npm run build
        env:
          DATABASE_URL: ""
          JWT_SECRET: "ci-test-secret-must-be-at-least-32-characters-long"
          NEXTAUTH_SECRET: "ci-test-secret-must-be-at-least-32-characters-long"

      - name: Run Lighthouse CI
        run: |
          npm install -g @lhci/cli@0.14.x
          lhci autorun --config=.lighthouserc.json || echo "LHCI failed!"
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}

      - name: Upload Lighthouse reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-reports
          path: ./lhci-reports/
          retention-days: 7

  # ── Summary ──────────────────────────────────────────────────────────────
  summary:
    name: CI Summary
    runs-on: ubuntu-latest
    needs: [quality, e2e, lighthouse]
    if: always()
    steps:
      - name: Check all jobs status
        run: |
          echo "### 📊 Resumen de CI ###"
          echo "- Quality Gates: ${{ needs.quality.result }}"
          echo "- E2E Tests: ${{ needs.e2e.result }}"
          echo "- Lighthouse CI: ${{ needs.lighthouse.result }}"

          if [ "${{ needs.quality.result }}" != "success" ] || \
             [ "${{ needs.e2e.result }}" != "success" ] || \
             [ "${{ needs.lighthouse.result }}" != "success" ]; then
            echo "❌ CI falló"
            exit 1
          fi
          echo "✅ CI completado exitosamente"
