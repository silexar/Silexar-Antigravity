# SonarCloud Configuration for Silexar Pulse Quantum
# Enterprise code quality analysis following Fortune 500 standards
#
# @author SILEXAR AI Team
# @version 2040.1.0
# @quality Enterprise code quality gates
# @compliance SOC 2 Type II code quality requirements

# Project identification
sonar.projectKey=silexar-pulse-quantum
sonar.organization=silexar
sonar.projectName=Silexar Pulse Quantum
sonar.projectVersion=2040.1.0

# Source code configuration
sonar.sources=src
sonar.tests=src
sonar.test.inclusions=**/*.test.ts,**/*.test.tsx,**/*.spec.ts,**/*.spec.tsx
sonar.exclusions=**/node_modules/**,**/*.d.ts,**/coverage/**,**/.next/**,**/out/**,**/dist/**,**/build/**,**/*.stories.ts,**/*.stories.tsx

# Language configuration
sonar.typescript.lcov.reportPaths=coverage/lcov.info
sonar.javascript.lcov.reportPaths=coverage/lcov.info
sonar.testExecutionReportPaths=test-results/sonar-report.xml

# Quality gates - Fortune 500 standards
sonar.qualitygate.wait=true

# Coverage requirements
sonar.coverage.exclusions=**/*.test.ts,**/*.test.tsx,**/*.spec.ts,**/*.spec.tsx,**/*.stories.ts,**/*.stories.tsx,**/testing/**,**/__mocks__/**

# Code analysis configuration
sonar.sourceEncoding=UTF-8
sonar.scm.provider=git
sonar.scm.forceReloadAll=true

# Security analysis
sonar.security.hotspots.inheritFromParent=true

# Duplication analysis
sonar.cpd.exclusions=**/*.test.ts,**/*.test.tsx,**/*.spec.ts,**/*.spec.tsx

# Issue exclusions for generated code
sonar.issue.ignore.multicriteria=e1,e2,e3,e4,e5

# Exclude Next.js generated files
sonar.issue.ignore.multicriteria.e1.ruleKey=typescript:S1128
sonar.issue.ignore.multicriteria.e1.resourceKey=**/*.d.ts

# Exclude test files from certain rules
sonar.issue.ignore.multicriteria.e2.ruleKey=typescript:S2699
sonar.issue.ignore.multicriteria.e2.resourceKey=**/*.test.ts

# Exclude mock files from complexity rules
sonar.issue.ignore.multicriteria.e3.ruleKey=typescript:S3776
sonar.issue.ignore.multicriteria.e3.resourceKey=**/__mocks__/**

# Exclude Storybook files
sonar.issue.ignore.multicriteria.e4.ruleKey=typescript:S1128
sonar.issue.ignore.multicriteria.e4.resourceKey=**/*.stories.ts

# Exclude configuration files from certain rules
sonar.issue.ignore.multicriteria.e5.ruleKey=typescript:S1128
sonar.issue.ignore.multicriteria.e5.resourceKey=**/jest.config.js,**/next.config.js

# Analysis parameters
sonar.analysis.mode=publish
sonar.buildString=${BUILD_NUMBER}
sonar.branch.name=${BRANCH_NAME}

# Enterprise quality metrics
sonar.core.codeCoveragePlugin=lcov
sonar.dynamicAnalysis=reuseReports